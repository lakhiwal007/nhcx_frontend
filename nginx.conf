server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location /nhcx/frontend/ {
        try_files $uri $uri/ /nhcx/frontend/index.html;
    }
    location /nhcx/backend/api {
        proxy_pass ${BACKEND_URL};
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header ngrok-skip-browser-warning 69420;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
