        approved — this endpoint computes the delta. The wrapper re-derives the
        live clinical and billing record from DB (latest `ipd_clinical_notes`,
        revised `ipd_invoices`, discharge date) and diffs it against the snapshot
        of the last submitted/approved preauth for the same `claim_id`.
        The response lists `new_procedures[]` and `new_items[]` (scope present now
        but not in the original authorization), the `delta_amount`, and a
        `suggested_request` body. The frontend shows these, lets the user pick
        which new lines to include, and submits the selection to
