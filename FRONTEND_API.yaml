  /cashless/claims/prepare:
    get:
      tags: [Claims]
      operationId: prepareClaimDraft
      summary: Build the claim draft (creates the claim on first call)
      description: >
        Preview of what will be submitted in the discharge or final claim.
        Returns the same auto-resolved data as preauth/prepare —
        admission/discharge dates, diagnoses, invoice line items, care team,
        and supporting documents — plus the claim's `preauth_ref` and
        `preauth_status`. Use it to validate completeness before calling
        `claims/discharge` or `claims/submit`. `missing_fields` lists any
        required fields not yet resolvable.


        Pass `cashless_case_id` (preferred). The UC4 claim row does not exist
        during the pre-auth journey, so on the first call this **creates and
        links** the claim from the case — carrying over child, payer, policy and
        the approved preauth — and returns its new `claim_id`. Subsequent calls
        reuse the linked claim. `claim_id` is accepted transitionally for callers
        that already hold one. One of the two is required (else
        `WRAPPER-ERROR:1002`).
      parameters:
        - $ref: "#/components/parameters/RequestIdParam"
        - name: cashless_case_id
          in: query
          required: false
          schema:
            type: integer
          description: >-
            Cashless journey id (preferred, returned by `cashless/prepare`).
            Creates+links the UC4 claim on first call and returns its `claim_id`.
            Required when `claim_id` is absent.
        - name: claim_id
          in: query
          required: false
          schema:
            type: integer
          description: >-
            Transitional alias when the claim already exists. Required when
            `cashless_case_id` is absent.
      responses:
        "200":
          description: Claim draft details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimDraft"
              examples:
                success:
                  value:
                    claim_id: 101
                    payer_id: "1518@hcx"
                    policy_number: "POL-91711234567890-2026"
                    preauth_ref: "PA-2026-00001"
                    preauth_status: "APPROVED"
                    status: "submitted"
                    admission_date: "2026-05-04"
                    discharge_date: "2026-05-07"
                    total_amount: 50000
                    patient:
                      id: 12
                      name: "Arjun Mehta"
                      gender: "male"
                      dob: "2020-01-01"
                    diagnoses:
                      - code: "K80.20"
                        name: "Calculus of gallbladder"
                        primary: true
                        on_admission: true
                    procedures:
                      - code: "47562"
                        name: "Laparoscopic cholecystectomy"
                    items:
                      - service_code: "PKG-LAP-CHOLE"
                        service_name: "Laparoscopic cholecystectomy package"
                        quantity: 1
                        unit_price: 50000
                        net_amount: 50000
                    care_team:
                      - doc_id: 501
                        doc_name: "Dr. Mehta"
                        speciality: "MS"
                        registration_no: "MCI-12345"
                        role: "primary"
                    missing_fields: []

  /cashless/claims/{claim_id}/patient-context:
    patch:
      tags: [Claims]
      operationId: setClaimPatientContext
      summary: Supply patient/admission attributes the hospital DB cannot provide
      description: >
        NHCX requires a beneficiary identifier (ABHA number or PMJAY member id),
        patient DOB, and admission/discharge dates. When these are not resolvable
        from the hospital DB, `preauth/prepare` and `claims/prepare` list them in
        `missing_fields` (e.g. `patient.identifier`, `patient.dob`, `admission_date`).
        Use this endpoint to supply them. The values are persisted on the cashless
        case and merged into every subsequent preauth/claim draft and submission —
        no need to resend them on submit. Returns the refreshed `missing_fields`
        so the UI can confirm the blockers are cleared before submitting.
        Only the fields you pass are updated; omitted fields keep their stored value.
      parameters:
        - name: claim_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientContextRequest"
            examples:
              member_id:
                value:
                  patient_context:
                    member_id: "PMJAY-MEM-00123"
              full:
                value:
                  patient_context:
                    abha: "91-7112-3456-7890"
                    member_id: "PMJAY-MEM-00123"
                    dob: "2018-04-12"
                    admission_date: "2026-05-04"
      responses:
        "200":
          description: Patient context stored; refreshed draft validation returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientContextResponse"
              examples:
                cleared:
                  value:
                    claim_id: 101
                    status: "updated"
                    patient_context:
                      patient_member_id: "PMJAY-MEM-00123"
                      patient_dob: "2018-04-12"
                    missing_fields: []
        "400":
          description: No supported patient context attributes provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cashless/claims/discharge:
    post:
      tags: [Claims]
      operationId: submitDischargeClaim
      summary: Submit discharge claim
      parameters:
        - $ref: "#/components/parameters/ProviderIdHeader"
      description: >
        Use immediately after the patient is discharged. Sends a provisional
        UC4 claim (wf=14) with the preauth reference. Requires `preauth_ref`
        to be stored on the claim (call `claims/prepare` first to confirm
        `missing_fields` is empty). Diagnoses, procedures, items, and care
        team are auto-resolved from DB — pass overrides only when correcting.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DischargeClaimSubmitRequest"
            examples:
              minimal:
                value:
                  claim_id: 101
      responses:
        "202":
          description: Discharge claim submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimAcceptedResponse"
              examples:
                accepted:
                  value:
                    correlation_id: "f3be6a19-f3f4-4624-8f1d-384a37cead9d"
                    status: "submitted"
                    message: "Discharge claim submitted (wf=14)"

  /cashless/claims/discharge/resubmit:
    post:
      tags: [Claims]
      operationId: resubmitDischargeClaim
      summary: Resubmit a corrected discharge claim
      parameters:
        - $ref: "#/components/parameters/ProviderIdHeader"
      description: >
        Use after `claims/status` (for the discharge submission's
        `correlation_id`) returns `decision: REJECTED` on a **discharge**
        claim — i.e. `submit_discharge` had not yet been followed by a final
        claim submission. Sends the corrected discharge summary under NHCX
        workflow `DC01` (Discharge Correction Intimation), the code the
        payer expects for this exact case — distinct from `claims/resubmit`,
        which corrects a rejected **final** claim under workflow 16 and does
        not apply here (no final claim exists yet at the discharge stage).
        Pass only the fields being corrected; everything else is re-derived
        from DB, same as `claims/discharge`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DischargeClaimSubmitRequest"
            examples:
              corrected:
                value:
                  claim_id: 101
                  items:
                    - service_code: "47562"
                      service_name: "Laparoscopic cholecystectomy"
                      category: "SE"
                      quantity: 1
                      unit_price: 45000
                      net_amount: 45000
      responses:
        "202":
          description: Corrected discharge claim submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimAcceptedResponse"
              examples:
                accepted:
                  value:
                    correlation_id: "1a2b3c4d-5e6f-7089-abcd-ef1234567890"
                    status: "submitted"
                    message: "Discharge claim submitted (wf=14)"

  /cashless/claims/submit:
    post:
      tags: [Claims]
      operationId: submitFinalClaim
      summary: Submit final claim
      parameters:
        - $ref: "#/components/parameters/ProviderIdHeader"
      description: >
        Use after the discharge claim is settled and the final invoice is ready.
        Sends the UC4 final claim (wf=15/16) for adjudication. Requires
        `preauth_ref` on the claim. Items, diagnoses, care team, and
        admission/discharge dates are all auto-resolved from DB (same as
        `claims/prepare`). Pass overrides only when correcting the draft.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimSubmitRequest"
            examples:
              minimal:
                value:
                  claim_id: 101
      responses:
        "202":
          description: Final claim submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimAcceptedResponse"
              examples:
                accepted:
                  value:
                    correlation_id: "0e20b352-c4b7-49fa-9246-a8357d236f48"
                    status: "submitted"
                    message: "Claim submitted for adjudication"

