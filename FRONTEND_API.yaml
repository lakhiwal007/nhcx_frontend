  /cashless/prepare:
    post:
      tags: [Cashless Preparation]
      operationId: prepareCashless
      summary: Start cashless preparation
      parameters:
        - $ref: "#/components/parameters/ProviderIdHeader"
      description: >
        Minimal frontend API after policy selection. The wrapper reuses one
        cashless case per claim, derives payer and procedures from the DB,
        triggers InsurancePlan and CoverageEligibility internally, and returns
        one aggregated case response.


        **Always retryable.** If the InsurancePlan/CoverageEligibility submission
        fails (e.g. the payer certificate can't be fetched or the gateway is
        down), prepare does NOT return an error — it still returns `202` with a
        persisted `cashless_case_id`, `status: "failed"`, `next_actions`
        containing `"retry"`, and a `prepare_error` object describing the cause.
        To retry, re-POST this endpoint with the same body (the case is reused);
        add `force_refresh: true` to force a fresh attempt. A successful retry
        clears `prepare_error` and moves the case back to `pending`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashlessPrepareRequest"
            examples:
              selected_policy:
                value:
                  claim_id: 101
                  child_id: 1
                  policy_number: "POL-91711234567890-2026"
                  force_refresh: false
      responses:
        "202":
          description: Cashless preparation accepted
          content:
