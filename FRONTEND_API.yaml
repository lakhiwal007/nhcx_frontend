              schema:
                $ref: "#/components/schemas/ClaimAcceptedResponse"

  /cashless/claims/resubmit:
    post:
      tags: [Claims]
      operationId: resubmitClaim
      summary: Resubmit final claim
      description: >
        Use after `claims/status` returns `decision: QUERIED` or `REJECTED`
        when correcting clinical/billing data (not answering a payer
        questionnaire — use `query-response` for that). Pass only the fields
        being corrected; everything else is re-derived from DB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimSubmitRequest"
            examples:
              corrected:
                value:
                  claim_id: 101
                  procedures:
                    - code: "47562"
                      name: "Laparoscopic cholecystectomy"
                  diagnoses:
                    - code: "K80.20"
                      name: "Calculus of gallbladder"
      responses:
        "202":
          description: Claim resubmitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimAcceptedResponse"

  /cashless/claims/status/{correlation_id}:
    get:
      tags: [Claims]
      operationId: getClaimStatus
      summary: Check claim status
      parameters:
        - name: correlation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Claim status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimStatusResponse"
              examples:
                approved:
                  value:
                    correlation_id: "0e20b352-c4b7-49fa-9246-a8357d236f48"
                    claim_id: 101
                    workflow: "claim"
                    submitted_at: "2026-05-11T11:30:00+05:30"
                    status: "complete"
                    decision: "APPROVED"
                    approved_amount: 40000
                    payment_status: null
                    items:
                      - sequence: 1
                        adjudication:
                          submitted:
                            value: 50000
                            currency: "INR"
                          benefit:
                            value: 40000
                            currency: "INR"
                    totals:
                      submitted:
                        value: 50000
                        currency: "INR"
                      benefit:
                        value: 40000
                        currency: "INR"
                    errors: []
                    process_notes: []

  /cashless/reprocess/submit:
    post:
      tags: [Claims]
      operationId: submitReprocess
      summary: Submit reprocess request
      description: >
        Use to appeal or request reprocessing after a rejection or partial
        approval. Eligible when either `preauth_status` is REJECTED, QUERIED,
        or PARTIALLY_APPROVED, OR `claim_decision` is REJECTED or
        PARTIALLY_APPROVED (calling on any other state returns 400).
        `reason_code` should reflect why the hospital is appealing —
        use `claimrejected` for outright rejections, `partialpayment` for
        partial approvals, `clinicaleva` for clinical evaluation disputes,
        `improvedoc` when submitting additional documents.
        Attach supporting documents that justify the appeal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReprocessSubmitRequest"
            examples:
              appeal:
                value:
                  claim_id: 101
                  reason_code: "other"
                  description: "Additional clinical justification attached"
      responses:
        "202":
          description: Reprocess request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReprocessAcceptedResponse"
              examples:
                accepted:
                  value:
                    correlation_id: "6928d2cd-81f6-48b0-9c62-bf8f5a311847"
                    status: "submitted"
                    message: "Reprocess request submitted"

  /cashless/reprocess/status/{correlation_id}:
    get:
      tags: [Claims]
      operationId: getReprocessStatus
      summary: Check reprocess status
      description: >
        Poll after `reprocess/submit` until `status: complete`. Check
        `decision` to determine next step — APPROVED means the appeal
        succeeded and the claim can proceed; REJECTED means no further
        appeal path exists via NHCX. If the payer never responds, use
        `status/request` to query the NHCX gateway directly for the
        reprocess `correlation_id`.
      parameters:
        - name: correlation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reprocess status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReprocessStatusResponse"

  /cashless/payment/acknowledge:
    post:
      tags: [Payment]
      operationId: acknowledgePayment
      summary: Acknowledge payment notice
      description: >
        **Normally called automatically** — when the NHCX payment callback
        arrives, the backend enqueues an auto-acknowledgement job. Call this
        endpoint manually only when `acknowledgement_status` is "failed" and
        you need to retry.
        Only `payment_reference` is required — `claim_number`, `amount_received`,
        and `utr` are auto-resolved from the stored payment notice. Pass them
        only to override the payer-supplied values.
        Returns 400 if the payment notice is not found or the claim cannot
        be resolved from the payment reference.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentAcknowledgeRequest"
            examples:
              minimal:
                value:
                  payment_reference: "PAY-2026-00001"
              override:
                value:
                  payment_reference: "PAY-2026-00001"
                  claim_number: "CLM-101"
                  amount_received: 40000
                  utr: "UTR123456789"
      responses:
        "202":
          description: Payment acknowledgement submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentAcknowledgeResponse"

  /cashless/payment/status:
    get:
      tags: [Payment]
      operationId: searchPaymentStatus
      summary: Search payment status
      description: >
        Search payment events by `claim_id`, `payment_reference`, or
        `claim_reference`. Returns all lifecycle events for the matched
        payments — INITIATED (wf=30), PROCESSED (wf=31), SETTLED (wf=33).
        `settled: true` indicates at least one PAYMENT_SETTLED event exists.
        Each event includes full notice/reconciliation detail, UTR, gross/TDS/net
        breakdown, and acknowledgement status. Use this after the payer sends
        a payment notification (frontend task `acknowledge_payment` will appear).
      parameters:
        - name: claim_id
          in: query
          required: false
          schema:
            type: integer
        - name: payment_reference
          in: query
          required: false
          schema:
            type: string
        - name: claim_reference
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Payment events found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentStatusResponse"
        "404":
          description: No payment events matched the filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentStatusResponse"

  /cashless/payment/status/{correlation_id}:
    get:
      tags: [Payment]
      operationId: getPaymentStatus
      summary: Check payment status by correlation ID
      description: >
        Look up payment event by the `correlation_id` returned from
        `payment/acknowledge`. Same response shape as the search endpoint.
      parameters:
        - name: correlation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment events found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentStatusResponse"
        "404":
          description: No payment events matched the correlation ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentStatusResponse"

  /cashless/tasks:
    get:
      tags: [Tasks]
      operationId: listCashlessTasks
      summary: List frontend human tasks
      description: >
        Returns the hospital's pending or completed work queue generated
        automatically from NHCX callbacks. Tasks are created when payer
        decisions require hospital action — submitting documents, responding
        to queries, resubmitting preauth/claims, or acknowledging payments.
        Filter by `cashless_case_id` to get all tasks for one patient case.
        Note: `child_id` filter only matches tasks linked to a claim; it
        will not return communication tasks (which have no claim_id).
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, completed]
        - name: claim_id
          in: query
          required: false
          schema:
            type: integer
        - name: cashless_case_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter all tasks for a specific cashless case.
        - name: child_id
          in: query
          required: false
          schema:
            type: integer
        - name: workflow
          in: query
          required: false
          schema:
            type: string
            enum: [insurance_plan, coverage_eligibility, preauth, claim, reprocess, payment, communication]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Frontend task queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrontendTaskListResponse"

  /cashless/tasks/{task_id}:
    get:
      tags: [Tasks]
      operationId: getCashlessTask
      summary: Read one frontend human task
      description: >
        Returns full task detail including `action` (endpoint + payload_hint to
        execute the task), `required_documents`, and `metadata` (decision/errors
        from the payer callback that triggered this task).
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            oneOf:
              - type: integer
              - type: string
      responses:
        "200":
          description: Frontend task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrontendTask"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Tasks]
      operationId: completeCashlessTask
      summary: Mark a frontend human task completed
      description: >
        Marks a pending task as completed after the hospital has actioned it
        (submitted documents, responded to query, reviewed communication, etc.).
        Only works on `status: pending` tasks — calling on a completed task
        is a no-op (returns the task unchanged). Pass an optional `note` for
        audit trail and `metadata` for any completion context.
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            oneOf:
              - type: integer
              - type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FrontendTaskCompletionRequest"
      responses:
        "200":
          description: Completed frontend task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrontendTask"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cashless/communications:
    get:
      tags: [Communications]
      operationId: listCashlessCommunications
      summary: List payer communications
      description: >
        Lists payer-initiated communications received via the NHCX UC7 callback.
        Communications arrive asynchronously — a `review_communication` frontend
        task is generated for each one. The backend auto-sends an acknowledgement
        on receipt. Filter by `payer_code` or `child_id` (matched against the
        Communication.subject reference).
        Common reason codes: tatquery (TAT dispute), grievance, walletupdate,
        policychange, additionalinfo.
      parameters:
        - name: payer_code
          in: query
          required: false
          schema:
            type: string
        - name: child_id
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Payer communications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunicationListResponse"

  /cashless/communication/status/{correlation_id}:
    get:
      tags: [Communications]
      operationId: getCashlessCommunicationStatus
      summary: Read payer communication status
      description: >
        Returns the full detail of a single received payer communication.
        Use the `correlation_id` from the `review_communication` frontend task,
        from the list endpoint, or from the callback header.
        Includes all task fields, communication content (`payload[]`), and
        acknowledgement status.
      parameters:
        - name: correlation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payer communication status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunicationStatusResponse"

  /cashless/status/request:
    post:
      tags: [Cashless Preparation]
      operationId: requestNhcxGatewayStatus
      summary: Request NHCX gateway status
      description: >
        Use when a prior workflow (preauth, claim, reprocess, coverage eligibility)
        is stuck in `status: pending` and the payer has not responded. Sends a
        UC5 `/v1/status` probe to the NHCX gateway for the given `correlation_id`.
        The gateway delivers the async result via the `/v1/on_status` callback
        (not through the original workflow callback path).
        Pass the `correlation_id` from any prior `submit`/`check` response.
        `workflow_id` is auto-resolved from the stored transaction when omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GatewayStatusRequest"
      responses:
        "202":
          description: NHCX status request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayStatusResponse"

  /facilities:
    get:
      tags: [Facility Management]
      operationId: listFacilities
      summary: List registered HCX facilities
      description: >
        Returns all registered NHCX facility participants. Each record shows
        whether a decryption key is stored (`private_key_set: true/false`) but
        never exposes the PEM itself. Use before uploading a key to confirm
        the `facility_code` for the target facility.
      responses:
        "200":
          description: Facility list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacilityListResponse"
              examples:
                success:
                  value:
                    facilities:
                      - facility_code: "HOSP-001"
                        name: "City General Hospital"
                        hcx_participant_code: "hosp001@hcx"
                        active: true
                        private_key_set: true
                        environment: "production"
                        registry_id: "HFR-12345"

  /facilities/{facility_code}:
    get:
      tags: [Facility Management]
      operationId: getFacility
      summary: Get a single facility
      parameters:
        - name: facility_code
          in: path
          required: true
          schema:
            type: string
          example: "HOSP-001"
      responses:
        "200":
          description: Facility record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Facility"
        "404":
          description: Facility not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /facilities/{facility_code}/private_key:
    put:
      tags: [Facility Management]
      operationId: uploadFacilityPrivateKey
      summary: Upload or replace the RSA private key for a facility
      description: >
        Stores the facility's RSA private key PEM in `nhcx_facilities.private_key_pem`.
        This key is used to decrypt inbound NHCX callbacks addressed to this
        facility's `hcx_participant_code`. The full PEM string including
        `-----BEGIN RSA PRIVATE KEY-----` / `-----END RSA PRIVATE KEY-----`
        (or PKCS#8 `-----BEGIN PRIVATE KEY-----`) must be provided.
        Calling this endpoint replaces any previously stored key and immediately
        invalidates the in-process key cache so the new key takes effect on the
        next callback.
        **Security note**: the key is stored as plaintext in the database.
        Ensure DB access is restricted at the infrastructure level.
      parameters:
        - name: facility_code
          in: path
          required: true
          schema:
            type: string
          example: "HOSP-001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FacilityPrivateKeyRequest"
            examples:
              rsa_key:
                value:
                  private_key_pem: "-----BEGIN RSA PRIVATE KEY-----\nMIIEow...base64...\n-----END RSA PRIVATE KEY-----\n"
              pkcs8_key:
                value:
                  private_key_pem: "-----BEGIN PRIVATE KEY-----\nMIIEvQ...base64...\n-----END PRIVATE KEY-----\n"
      responses:
        "200":
          description: Key stored successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacilityPrivateKeyResponse"
              examples:
                success:
                  value:
                    facility_code: "HOSP-001"
                    private_key_set: true
        "404":
          description: Facility not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Invalid or non-private PEM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not_private:
                  value:
                    error:
                      code: "WRAPPER-ERROR:4221"
                      message: "PEM is not a private key"
                malformed:
                  value:
                    error:
                      code: "WRAPPER-ERROR:4222"
                      message: "Invalid PEM: Neither PUB key nor PRIV key: nested asn1 error"

components:
  schemas:
    Facility:
      type: object
      properties:
        facility_code:
          type: string
          description: Unique short code for this facility (e.g. HOSP-001).
        name:
          type: string
        hcx_participant_code:
          type: string
          description: HCX participant address (e.g. hosp001@hcx). Used as sender_code in all NHCX requests.
        active:
          type: boolean
        private_key_set:
          type: boolean
          description: True when a private key PEM is stored for this facility. The PEM itself is never returned.
        environment:
          type: string
          nullable: true
          example: production
        registry_id:
          type: string
          nullable: true
          description: HFR/NPI registry identifier.

    FacilityListResponse:
      type: object
      properties:
        facilities:
          type: array
          items:
            $ref: "#/components/schemas/Facility"

    FacilityPrivateKeyRequest:
      type: object
      required: [private_key_pem]
      properties:
        private_key_pem:
          type: string
          description: >
            Full RSA private key in PEM format. Must include the
            `-----BEGIN ... KEY-----` / `-----END ... KEY-----` header and footer.
            Both traditional RSA (`BEGIN RSA PRIVATE KEY`) and PKCS#8
            (`BEGIN PRIVATE KEY`) formats are accepted.
          example: "-----BEGIN RSA PRIVATE KEY-----\nMIIEow...\n-----END RSA PRIVATE KEY-----\n"

    FacilityPrivateKeyResponse:
      type: object
      properties:
        facility_code:
          type: string
        private_key_set:
          type: boolean

    DashboardStats:
      type: object
      properties:
        claims:
          type: object
          properties:
            total:
              type: integer
            pending:
              type: integer
            partial:
              type: integer
            complete:
              type: integer
            failed:
              type: integer
            preauth_pending:
              type: integer
        children:
          type: object
          properties:
            with_claims:
              type: integer

    DashboardClaimsResponse:
      type: object
      properties:
        total_count:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        claims:
          type: array
          items:
            $ref: "#/components/schemas/ClaimSummary"

    ClaimSummary:
      type: object
      properties:
        id:
          type: integer
        child_id:
          type: integer
        child_name:
          type: string
          nullable: true
        patient_name:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
        use_type:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        claim_decision:
          type: string
          nullable: true
        approved_amount:
          type: number
          nullable: true
        payment_status:
          type: string
          nullable: true
        latest_utr:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        pending_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        completed_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    ChildSearchResponse:
      type: object
      properties:
        total_count:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/Child"

    Child:
      type: object
      properties:
        child_id:
          type: integer
        name:
          type: string
        gender:
          type: string
        dob:
          type: string
          format: date
          nullable: true
        mobile:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        cashless_cases_count:
          type: integer
        latest_claim:
          type: object
          nullable: true
          properties:
            cashless_case_id:
              type: integer
              description: Primary key of the `nhcx_cashless_cases` DB row.
            claim_id:
              type: integer
            status:
              type: string
            current_step:
              type: string
            payer_code:
              type: string
            provider_id:
              type: string
              nullable: true
            policy_number:
              type: string
            preauth_status:
              type: string
              nullable: true
            created_at:
              type: string
              format: date-time
        visits:
          type: array
          description: Present only when child search is filtered by `child_id` or `name`.
          items:
            $ref: "#/components/schemas/VisitSummary"

    VisitSummary:
      type: object
      properties:
        visit_type:
          type: string
          enum: [ipd, opd]
        admission_id:
          type: integer
          nullable: true
        admission_no:
          type: string
          nullable: true
        appointment_id:
          type: integer
          nullable: true
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        diagnosis:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        purpose_of_visit:
          type: string
          nullable: true
        primary_doctor:
          $ref: "#/components/schemas/VisitDoctor"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/VisitInvoice"
        procedures:
          type: array
          description: >
            Clinical procedures on record for this admission (from ipd_clinical_notes).
            Only present when viewing a single child by child_id or name. Use these to
            preview what will be submitted to NHCX before calling /cashless/prepare.
          items:
            $ref: "#/components/schemas/Procedure"
        claims:
          type: array
          items:
            $ref: "#/components/schemas/VisitClaim"

    VisitDoctor:
      type: object
      nullable: true
      properties:
        doctor_id:
          type: integer
        name:
          type: string
        specialization:
          type: string
        registration_no:
          type: string

    VisitInvoice:
      type: object
      properties:
        invoice_id:
          type: integer
        invoice_type:
          type: string
          enum: [ipd, opd]
        invoice_no:
          type: string
        invoice_date:
          type: string
        amount_billed:
          type: number
        final_amount:
          type: number
        final_discount:
          type: number
        billing_status:
          type: string
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/BillingLineItem"

    BillingLineItem:
      type: object
      properties:
        line_item_id:
          type: integer
        code:
          type: string
        name:
          type: string
        category:
          type: string
        quantity:
          type: number
        unit_price:
          type: number
        net_amount:
          type: number

    VisitClaim:
      type: object
      properties:
        claim_id:
          type: integer
        cashless_case_id:
          type: integer
          nullable: true
        status:
          type: string
        use_type:
          type: string
          nullable: true
        payer_code:
          type: string
          nullable: true
        payer_name:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
        policy_number:
          type: string
          nullable: true
        total_billed:
          type: number
          nullable: true
        preauth_status:
          type: string
          nullable: true
        claim_decision:
          type: string
          nullable: true
        payment_status:
          type: string
          nullable: true
        current_step:
          type: string
          nullable: true
        cashless_status:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Payer:
      type: object
      properties:
        participant_code:
          type: string
          example: "1518@hcx"
        name:
          type: string
          example: "Sample Payer"
        scheme_type:
          type: string
          example: "PMJAY"
        status:
          type: string
          example: "active"

    FetchPoliciesRequest:
      type: object
      required: [child_id, payer_code]
      properties:
        child_id:
          type: integer
          description: Hospital child identifier. Backend resolves this to ABHA/member/mobile before policy lookup.
          example: 728
        admission_id:
          type: string
          nullable: true
          example: "ADM123"
        payer_code:
          type: string
          description: Selected payer participant code from payer search.
          example: "1518@hcx"
        force_refresh:
          type: boolean
          default: false

    FetchPoliciesResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: object
          properties:
            child_id:
              type: string
            payer_code:
              type: string
            identifier_used:
              type: object
              properties:
                type:
                  type: string
                  enum: [AbhaNumber, MemberId, MobileNo, ChildId]
                value:
                  type: string
            policies:
              type: array
              items:
                $ref: "#/components/schemas/Policy"
            fetched_at:
              type: string
              format: date-time

    Policy:
      type: object
      properties:
        policy_number:
          type: string
        product_name:
          type: string
        payer_id:
          type: string
        payer_name:
          type: string
        status:
          type: string
        sum_insured:
          type: number
        currency:
          type: string
        effective_from:
          type: string
          format: date
        effective_to:
          type: string
          format: date

    InsurancePlanRequest:
      type: object
      required: [child_id, payer_code, policy_number]
      properties:
        request_id:
          type: string
          nullable: true
        child_id:
          type: integer
          example: 728
        payer_code:
          type: string
          description: Selected payer participant code.
          example: "1000003423@hcx"
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code` and InsurancePlan Task.input `providerId`. Defaults to configured provider id when omitted.
          example: "1000003599@hcx"
        policy_number:
          type: string
          example: "13010034242800000257"

    InsurancePlanRequestResponse:
      type: object
      properties:
        correlation_id:
          type: string
        request_id:
          type: string
        policy_number:
          type: string
        provider_id:
          type: string
        status:
          type: string
          enum: [submitted, failed]
        message:
          type: string

    InsurancePlanStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum: [pending, complete, not_found]
        correlation_id:
          type: string
        request:
          type: object
        result:
          type: object
          nullable: true
        plan_details:
          type: object
        inclusions:
          type: array
          items:
            type: object
        exclusions:
          type: array
          items:
            type: object
        pricing:
          oneOf:
            - type: object
            - type: array
              items:
                type: object
        coverage_benefits:
          type: array
          items:
            type: object
        claim_conditions:
          type: array
          items:
            type: object
        document_requirements:
          type: array
          items:
            type: object
        fhir_bundle:
          type: object
          nullable: true
          description: Raw decrypted FHIR Bundle from the NHCX InsurancePlan callback. Present only when status is complete.

    CashlessPrepareRequest:
      type: object
      required: [child_id, policy_number]
      properties:
        request_id:
          type: string
          nullable: true
        claim_id:
          type: integer
        child_id:
          type: integer
        policy_number:
          type: string
        payer_code:
          type: string
          nullable: true
          description: Selected payer participant code.
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id to persist on the claim and use as the NHCX sender for all downstream workflows. Defaults to the stored claim/facility provider or configured provider when omitted.
        admission_id:
          type: string
          nullable: true
        invoice_id:
          type: string
          nullable: true
        force_refresh:
          type: boolean
          default: false
        procedures:
          type: array
          nullable: true
          description: >
            Optional procedure overrides. If omitted, the wrapper derives procedures from
            clinical records (ipd_clinical_notes). Pass these when the patient has no clinical
            note procedures in the DB yet (source will be "override" in the response).
            Each procedure should include at minimum code and name.
          items:
            $ref: "#/components/schemas/Procedure"

    CashlessCase:
      type: object
      properties:
        cashless_case_id:
          type: integer
          description: Primary key of the `nhcx_cashless_cases` DB row. Use it to poll `/cashless/{cashless_case_id}`.
        claim_id:
          type: integer
        child_id:
          type: integer
        payer_code:
          type: string
        policy_number:
          type: string
        status:
          type: string
          enum: [pending, partial, complete, failed]
        current_step:
          type: string
          example: insurance_and_eligibility
        next_actions:
          type: array
          items:
            type: string
        pending_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        completed_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        procedures:
          $ref: "#/components/schemas/ProcedureBlock"
        insurance_plan:
          $ref: "#/components/schemas/InsurancePlanSummary"
        coverage_eligibility:
          $ref: "#/components/schemas/CoverageEligibilitySummary"

    ProcedureBlock:
      type: object
      properties:
        source:
          type: string
          enum: [claim_db, override, none]
          description: >
            "claim_db" = derived from ipd_clinical_notes in the hospital DB.
            "override" = explicitly passed by the frontend in the prepare request.
            "none" = no procedures available — coverage eligibility was submitted with validation purpose only.
        source_context:
          type: object
          nullable: true
          description: Traceability — which DB records the procedures were derived from.
          properties:
            admission_id:
              type: integer
              nullable: true
            clinical_note_id:
              type: integer
              nullable: true
            invoice_id:
              type: integer
              nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/Procedure"

    Procedure:
      type: object
      properties:
        category:
          type: string
          description: >
            NDHM benefit category code. Common values: SE (Surgical), GM (General Medicine),
            ROOM (Room and nursing), INV (Investigation), MED (Medicines), OT (Other).
          example: "SE"
        code:
          type: string
          description: Procedure code (SNOMED CT or NDHM procedure code).
          example: "47562"
        name:
          type: string
          example: "Laparoscopic cholecystectomy"
        date:
          type: string
          format: date
          nullable: true
          description: Date the procedure was performed or scheduled.
          example: "2026-05-04"
        modifiers:
          type: array
          items:
            type: object

    InsurancePlanSummary:
      type: object
      properties:
        status:
          type: string
          enum: [pending, complete, failed, not_found]
        correlation_id:
          type: string
        plan_details:
          type: object
        inclusions:
          type: array
          items:
            type: object
        exclusions:
          type: array
          items:
            type: object
        pricing:
          oneOf:
            - type: object
            - type: array
              items:
                type: object
        coverage_benefits:
          type: array
          items:
            type: object
        claim_conditions:
          type: array
          items:
            type: object
        document_requirements:
          type: array
          items:
            type: object
        raw_payload:
          type: object
          nullable: true
        stored_record:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            request_id:
              type: string
            child_id:
              type: integer
            payer_code:
              type: string
            updated_at:
              type: string
              format: date-time
              nullable: true
        errors:
          type: array
          description: >
            Gateway-level protocol errors (e.g. HBP004 "not applicable in this hospital").
            Non-empty when status is "failed".
          items:
            type: object
            properties:
              code:
                type: string
                nullable: true
              message:
                type: string
                nullable: true

    CoverageEligibilitySummary:
      type: object
      properties:
        status:
          type: string
          enum: [pending, complete, failed, not_found]
        correlation_id:
          type: string
        outcome:
          type: string
          nullable: true
        disposition:
          type: string
          nullable: true
        inforce:
          type: boolean
          nullable: true
          description: Overall coverage in-force flag from the payer.
        auth_required:
          type: boolean
          nullable: true
          description: True if any item in insurance_items has authorization_required=true.
        coverage_reference:
          type: string
          nullable: true
          description: FHIR Coverage resource reference from the payer response.
        insurance_items:
          type: array
          items:
            $ref: "#/components/schemas/CoverageEligibilityInsurance"
        errors:
          type: array
          description: >
            FHIR-level CoverageEligibility errors from the payer response, plus
            any gateway-level protocol errors (e.g. HBP004). Non-empty when the
            payer returns error outcomes or the gateway rejects the request.
          items:
            oneOf:
              - $ref: "#/components/schemas/CoverageEligibilityError"
              - type: object
                properties:
                  code:
                    type: string
                    nullable: true
                  message:
                    type: string
                    nullable: true

    CoverageEligibilityCheckRequest:
      type: object
      description: >
        Either `claim_id` or `child_id` is required (not both). When `claim_id`
        is provided, `payer_code` and `policy_number` are auto-resolved from the
        claim. When only `child_id` is provided (no existing claim), a draft claim
        is created from `child_id + payer_code + policy_number`.
      properties:
        request_id:
          type: string
          nullable: true
        claim_id:
          type: integer
          nullable: true
          description: Existing claim ID. Either this or child_id is required.
        child_id:
          type: integer
          nullable: true
          description: >
            Hospital child ID. Use when no claim exists yet. A draft claim will
            be created from child_id + payer_code + policy_number.
        payer_code:
          type: string
          nullable: true
          description: Payer participant code. Auto-resolved from the claim when omitted.
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to configured provider id when omitted.
        policy_number:
          type: string
          nullable: true
          description: Policy number. Auto-resolved from the claim's `policy_ref` when omitted.
        purpose:
          type: string
          enum: [validation, benefits, auth-requirements]
          default: validation
        procedures:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcedure"
        diagnoses:
          type: array
          description: Optional diagnosis context for CoverageEligibility item.diagnosis.
          items:
            $ref: "#/components/schemas/PreauthDiagnosis"
        care_team:
          type: array
          description: Optional primary clinician context; the first member is included as Practitioner.
          items:
            $ref: "#/components/schemas/PreauthCareTeamMember"

    CoverageEligibilityAcceptedResponse:
      type: object
      properties:
        correlation_id:
          type: string
        request_id:
          type: string
        policy_number:
          type: string
          nullable: true
        status:
          type: string
          example: submitted
        message:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

    CoverageEligibilityStatusResponse:
      allOf:
        - $ref: "#/components/schemas/CoverageEligibilitySummary"
        - type: object
          properties:
            correlation_id:
              type: string
            claim_id:
              type: integer
              nullable: true
            payer_code:
              type: string
              nullable: true
            provider_id:
              type: string
              nullable: true
            purpose:
              type: string
              nullable: true
              enum: [validation, benefits, auth-requirements, null]
              description: The eligibility purpose that was submitted.
            coverage_reference:
              type: string
              nullable: true
              description: Reference to the Coverage FHIR resource from the payer response.
            workflow:
              type: string
              example: coverage_eligibility
            submitted_at:
              type: string
              format: date-time
              nullable: true
            fhir_bundle:
              type: object
              nullable: true
              description: Raw decrypted FHIR Bundle from the NHCX CoverageEligibility callback. Present only when status is complete.
            pending_tasks:
              type: array
              items:
                $ref: "#/components/schemas/FrontendTask"
            completed_tasks:
              type: array
              items:
                $ref: "#/components/schemas/FrontendTask"

    CoverageEligibilityInsurance:
      type: object
      properties:
        coverage:
          type: string
          nullable: true
          description: Reference to the linked Coverage resource.
          example: "4d41c7bb-4bac-4de0-8030-e55e6bc26aad"
        inforce:
          type: boolean
          nullable: true
          description: Coverage in force flag. Null when payer does not include it (PMJAY).
        benefit_period:
          type: object
          nullable: true
          description: Coverage benefit period from insurance[].benefitPeriod.
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        coverage_details:
          type: object
          nullable: true
          description: >
            Details resolved from the linked FHIR Coverage resource in the bundle.
            Includes plan name, sum insured, and member ID extracted from Coverage.class[].
          properties:
            status:
              type: string
              example: "active"
            member_id:
              type: string
              nullable: true
              example: "100217"
            plan:
              type: string
              nullable: true
              description: Coverage class value for type "plan".
              example: "PX/HR/PX/I-ChirayuEx HR PX"
            plan_name:
              type: string
              nullable: true
              description: Display name of the plan class.
            sum_insured:
              type: string
              nullable: true
              description: Coverage class value for type "subplan" (sum insured amount as string).
              example: "500000.00"
            classes:
              type: array
              description: All Coverage.class[] entries.
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  type:
                    type: string
                    enum: [plan, subplan, group, subgroup]
                  value:
                    type: string
        items:
          type: array
          description: Benefit items from insurance[].item[]. Empty when payer returns a simple eligibility confirmation without item-level breakdown (common in PMJAY).
          items:
            $ref: "#/components/schemas/CoverageEligibilityItem"

    CoverageEligibilityItem:
      type: object
      description: >
        Benefit item from CoverageEligibilityResponse.insurance[].item[].
        Keys are normalized to snake_case by the backend regardless of how
        the payer sent them.
      properties:
        sequence:
          type: integer
          nullable: true
          example: 1
        category:
          $ref: "#/components/schemas/CodedValue"
        product_or_service:
          $ref: "#/components/schemas/CodedValue"
          description: The procedure or service covered by this benefit item.
        excluded:
          type: boolean
          example: false
          description: true if this procedure is explicitly excluded from coverage.
        benefit:
          type: array
          items:
            $ref: "#/components/schemas/CoverageEligibilityBenefit"
        authorization_required:
          type: boolean
          nullable: true
          example: true
          description: Whether this item requires preauthorization before treatment.
        authorization_supporting:
          type: array
          description: Documents required by the payer before issuing preauth for this item.
          items:
            $ref: "#/components/schemas/CodedValue"

    CoverageEligibilityBenefit:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/CodedValue"
        allowed:
          $ref: "#/components/schemas/CoverageEligibilityBenefitValue"
        used:
          $ref: "#/components/schemas/CoverageEligibilityBenefitValue"

    CoverageEligibilityBenefitValue:
      type: object
      nullable: true
      properties:
        type:
          type: string
          enum: [Money, UnsignedInt, String]
          example: "Money"
        value:
          oneOf:
            - type: number
            - type: integer
            - type: string
          example: 50000
        currency:
          type: string
          nullable: true
          example: "INR"

    CoverageEligibilityError:
      type: object
      properties:
        code:
          type: object
          properties:
            code:
              type: string
            system:
              type: string
            display:
              type: string
        detail:
          type: string
          nullable: true

    CodedValue:
      type: object
      properties:
        code:
          type: string
          nullable: true
        display:
          type: string
          nullable: true

    PreauthDraft:
      type: object
      properties:
        claim_id:
          type: integer
        source:
          $ref: "#/components/schemas/PreauthSource"
          description: Shared hospital DB record references used to build the draft.
        patient:
          $ref: "#/components/schemas/PreauthPatient"
        payer_code:
          type: string
        policy_number:
          type: string
        admission_date:
          type: string
          format: date
        discharge_date:
          type: string
          format: date
          nullable: true
        inpatient:
          type: boolean
        urgent:
          type: boolean
        diagnoses:
          type: array
          items:
            $ref: "#/components/schemas/PreauthDiagnosis"
        procedures:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcedure"
        items:
          type: array
          items:
            $ref: "#/components/schemas/PreauthLineItem"
        care_team:
          type: array
          items:
            $ref: "#/components/schemas/PreauthCareTeamMember"
        supporting_documents:
          type: array
          items:
            $ref: "#/components/schemas/PreauthSupportingDocument"
        total_amount:
          type: number
        eligibility:
          $ref: "#/components/schemas/PreauthEligibility"
          nullable: true
        missing_fields:
          type: array
          items:
            type: string

    PreauthEnhancementPreview:
      type: object
      description: >
        Delta between the last authorized preauth and the current hospital
        record. Lets the frontend show the user exactly what new scope exists
        before submitting a UC3 enhancement, then POST the selection to
        `/cashless/preauth/enhancement`.
      properties:
        claim_id:
          type: integer
        payer_code:
          type: string
          nullable: true
        policy_number:
          type: string
          nullable: true
        preauth_ref:
          type: string
          nullable: true
          description: Reference of the preauth being enhanced (from the prior approval).
        enhanceable:
          type: boolean
          description: >
            True when a prior successful preauth exists AND the current record
            adds scope. When false, the UI disables the Submit Enhancement action.
        reason:
          type: string
          nullable: true
          description: Why enhancement is unavailable. Populated only when `enhanceable` is false.
        authorized:
          type: object
          description: Snapshot of the last submitted/approved preauth for this claim.
          properties:
            total_amount:
              type: number
              nullable: true
            approved_amount:
              type: number
              nullable: true
            procedures:
              type: array
              items:
                $ref: "#/components/schemas/PreauthProcedure"
            items:
              type: array
              items:
                $ref: "#/components/schemas/PreauthLineItem"
        current:
          type: object
          description: Live state re-derived from the hospital DB at request time.
          properties:
            total_amount:
              type: number
              nullable: true
            procedures:
              type: array
              items:
                $ref: "#/components/schemas/PreauthProcedure"
            items:
              type: array
              items:
                $ref: "#/components/schemas/PreauthLineItem"
        new_procedures:
          type: array
          description: "Procedures present in `current` but absent from `authorized`. Each carries `is_new: true`."
          items:
            $ref: "#/components/schemas/PreauthProcedure"
        new_items:
          type: array
          description: "Invoice line items present in `current` but absent from `authorized`. Each carries `is_new: true`."
          items:
            $ref: "#/components/schemas/PreauthLineItem"
        delta_amount:
          type: number
          nullable: true
          description: "`current.total_amount` minus `authorized.total_amount`."
        supporting_documents:
          type: array
          items:
            $ref: "#/components/schemas/PreauthSupportingDocument"
        missing_fields:
          type: array
          items:
            type: string
        suggested_request:
          type: object
          description: >
            Ready-to-submit `POST /cashless/preauth/enhancement` body seeded with
            the full current scope (authorized + new). The frontend may prune
            `items`/`procedures` the user chose not to include before submitting.
          additionalProperties: true

    PatientContextRequest:
      type: object
      description: >
        Patient/admission attributes supplied by the frontend when they cannot be
        resolved from the hospital DB. May be sent flat or nested under
        `patient_context`. All fields optional; at least one must be present.
      properties:
        patient_context:
          type: object
          properties:
            name:
              type: string
              nullable: true
            gender:
              type: string
              nullable: true
            dob:
              type: string
              format: date
              nullable: true
            abha:
              type: string
              nullable: true
              description: ABHA number / health id used as the beneficiary identifier.
            member_id:
              type: string
              nullable: true
              description: PMJAY / payer member id used as the beneficiary identifier.
            admission_date:
              type: string
              format: date
              nullable: true
            discharge_date:
              type: string
              format: date
              nullable: true

    PatientContextResponse:
      type: object
      properties:
        claim_id:
          type: integer
        status:
          type: string
          example: updated
        patient_context:
          type: object
          description: The merged stored overrides, keyed by the internal draft override names.
          additionalProperties: true
        missing_fields:
          type: array
          description: Refreshed preauth-draft validation after applying the context.
          items:
            type: string

    PreauthSubmitRequest:
      type: object
      required: [claim_id]
      description: >
        Minimal preauth submission request. Only `claim_id` is required —
        `payer_code` and `policy_number` are auto-resolved from the claim record,
        and `eligibility_correlation_id` is auto-resolved from the cashless case
        linked to the claim. Clinical, billing, care team, document, date, and
        amount fields are optional overrides only when the frontend user edits
        the prepared draft.
      properties:
        request_id:
          type: string
          nullable: true
        claim_id:
          type: integer
        payer_code:
          type: string
          nullable: true
          description: >
            Payer participant code. Auto-resolved from the claim record when
            omitted. Pass to override (e.g. to target a different payer).
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to configured provider id when omitted.
        policy_number:
          type: string
          nullable: true
          description: >
            Policy number. Auto-resolved from the claim record when omitted.
            Pass to override (e.g. to target a different policy).
        eligibility_correlation_id:
          type: string
          nullable: true
          description: >
            Correlation ID from a prior CoverageEligibility check. Auto-resolved
            from the cashless case linked to this claim when omitted.
        admission_date:
          type: string
          format: date
          nullable: true
        discharge_date:
          type: string
          format: date
          nullable: true
        inpatient:
          type: boolean
          nullable: true
        urgent:
          type: boolean
          nullable: true
        diagnoses:
          type: array
          items:
            $ref: "#/components/schemas/PreauthDiagnosis"
        procedures:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcedure"
        items:
          type: array
          items:
            $ref: "#/components/schemas/PreauthLineItem"
        care_team:
          type: array
          items:
            $ref: "#/components/schemas/PreauthCareTeamMember"
        supporting_documents:
          type: array
          items:
            $ref: "#/components/schemas/PreauthSupportingDocument"
        questionnaire:
          $ref: "#/components/schemas/FhirQuestionnaire"
        questionnaire_response:
          $ref: "#/components/schemas/FhirQuestionnaireResponse"
        total_amount:
          type: number
          nullable: true

    PreauthSource:
      type: object
      properties:
        parent_schema_available:
          type: boolean
          example: true
        admission_id:
          type: integer
          nullable: true
        appointment_id:
          type: integer
          nullable: true
        child_id:
          type: integer
          nullable: true
        ipd_invoice_id:
          type: integer
          nullable: true
        clinical_note_id:
          type: integer
          nullable: true

    PreauthPatient:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        dob:
          type: string
          format: date
          nullable: true
        abha:
          type: string
          nullable: true
        member_id:
          type: string
          nullable: true

    PreauthDiagnosis:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        primary:
          type: boolean
        on_admission:
          type: boolean

    PreauthProcedure:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        date:
          type: string
          format: date
          nullable: true
        diagnoses:
          type: array
          description: Optional per-procedure diagnoses for CoverageEligibility item.diagnosis.
          items:
            $ref: "#/components/schemas/PreauthDiagnosis"

    PreauthLineItem:
      type: object
      properties:
        service_code:
          type: string
        service_name:
          type: string
        category:
          type: string
          nullable: true
        service_start_date:
          type: string
          format: date
          nullable: true
        quantity:
          type: number
        unit_price:
          type: number
        net_amount:
          type: number
        care_team_sequence:
          type: array
          items:
            type: integer
        diagnosis_sequence:
          type: array
          items:
            type: integer
        procedure_sequence:
          type: array
          items:
            type: integer

    PreauthCareTeamMember:
      type: object
      properties:
        doc_id:
          oneOf:
            - type: string
            - type: integer
          nullable: true
        doc_name:
          type: string
          nullable: true
        speciality:
          type: string
          nullable: true
          description: >
            NHCX practitioner speciality code (e.g. "MS", "MD"). Auto-resolved
            from `doctors.specialization` when doctor is linked via users table.
        speciality_display:
          type: string
          nullable: true
        registration_no:
          type: string
          nullable: true
          description: >
            Medical council registration number. Auto-resolved from
            `doctors.registration_no` when doctor is linked via users table.
        role:
          type: string
          nullable: true
          description: >
            Care team role — "primary" for the admitting/treating doctor,
            "referring" for doctors listed in ipd_invoices.referring_doctors.

    PreauthSupportingDocument:
      type: object
      properties:
        category:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
        event_date:
          type: string
          format: date
          nullable: true
        url:
          type: string
          nullable: true
        file_url:
          type: string
          nullable: true
        content_type:
          type: string
          nullable: true
          example: application/pdf
        title:
          type: string
          nullable: true
        data:
          type: string
          nullable: true
          description: Base64 encoded attachment content when URL is not available.

    FhirQuestionnaire:
      type: object
      nullable: true
      description: Optional FHIR Questionnaire resource data for query-response bundles.
      properties:
        id:
          oneOf:
            - type: string
            - type: integer
          nullable: true
        url:
          type: string
          nullable: true
        status:
          type: string
          default: active
        name:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        item:
          type: array
          items:
            type: object
            additionalProperties: true
        items:
          type: array
          description: Alias accepted by the backend for `item`.
          items:
            type: object
            additionalProperties: true

    FhirQuestionnaireResponse:
      type: object
      nullable: true
      description: Optional FHIR QuestionnaireResponse data for payer query responses.
      properties:
        id:
          oneOf:
            - type: string
            - type: integer
          nullable: true
        questionnaire:
          type: string
          nullable: true
        status:
          type: string
          default: completed
        authored:
          type: string
          format: date-time
          nullable: true
        item:
          type: array
          items:
            type: object
            additionalProperties: true
        items:
          type: array
          description: Alias accepted by the backend for `item`.
          items:
            type: object
            additionalProperties: true

    PreauthEligibility:
      type: object
      nullable: true
      properties:
        correlation_id:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        outcome:
          type: string
          nullable: true
        inforce:
          type: boolean
          nullable: true
        auth_required:
          type: boolean
          nullable: true
        insurance_items:
          type: array
          items:
            $ref: "#/components/schemas/CoverageEligibilityInsurance"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/CoverageEligibilityError"

    PreauthAcceptedResponse:
      type: object
      properties:
        correlation_id:
          type: string
        preauth_ref:
          type: string
          nullable: true
        policy_number:
          type: string
        status:
          type: string
          example: submitted
        message:
          type: string

    PreauthCancelRequest:
      type: object
      required: [claim_id]
      properties:
        request_id:
          type: string
          nullable: true
        claim_id:
          type: integer
        payer_code:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to configured provider id when omitted.
        preauth_ref:
          type: string
          nullable: true
          description: >
            Preauthorization reference returned by payer. Auto-resolved from the
            claim's stored `preauth_ref` when omitted; pass to override.
          example: "PA-2026-00001"
        reason:
          type: string
          enum:
            - treatmentplanchanged
            - patientrequest
            - financialconstraints
            - alternativetreatment
            - duplicateclaim
            - administrativeerror
            - other
          default: treatmentplanchanged
        description:
          type: string
          nullable: true

    PreauthStatusResponse:
      type: object
      properties:
        correlation_id:
          type: string
        claim_id:
          type: integer
        provider_id:
          type: string
          nullable: true
        workflow:
          type: string
          example: preauth
        submitted_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, complete, not_found]
        decision:
          type: string
          nullable: true
        preauth_ref:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/PreauthAdjudicationItem"
        totals:
          $ref: "#/components/schemas/PreauthTotals"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/PreauthError"
        process_notes:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcessNote"
        fhir_bundle:
          type: object
          nullable: true
          description: Raw decrypted FHIR Bundle from the NHCX preauth callback. Present only when status is complete.
        pending_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        completed_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    PreauthAdjudicationItem:
      type: object
      properties:
        sequence:
          type: integer
          nullable: true
        detail_sequence:
          type: integer
          nullable: true
        adjudication:
          $ref: "#/components/schemas/PreauthAdjudication"
        notes:
          type: array
          items:
            type: integer

    PreauthAdjudication:
      type: object
      properties:
        submitted:
          $ref: "#/components/schemas/PreauthMoney"
        eligible:
          $ref: "#/components/schemas/PreauthMoney"
        benefit:
          $ref: "#/components/schemas/PreauthMoney"
        copay:
          $ref: "#/components/schemas/PreauthMoney"
        deductible:
          $ref: "#/components/schemas/PreauthMoney"

    PreauthTotals:
      type: object
      properties:
        submitted:
          $ref: "#/components/schemas/PreauthMoney"
        eligible:
          $ref: "#/components/schemas/PreauthMoney"
        benefit:
          $ref: "#/components/schemas/PreauthMoney"
        copay:
          $ref: "#/components/schemas/PreauthMoney"

    PreauthMoney:
      type: object
      nullable: true
      properties:
        value:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true

    PreauthError:
      type: object
      properties:
        code:
          type: string
          nullable: true
        display:
          type: string
          nullable: true
        detail:
          type: string
          nullable: true

    PreauthProcessNote:
      type: object
      properties:
        number:
          type: integer
          nullable: true
        type:
          type: string
          nullable: true
        text:
          type: string
          nullable: true
        language:
          type: string
          nullable: true

    ClaimDraft:
      type: object
      description: >
        Read-only preview of what will be submitted in the discharge or final claim.
        Mirrors PreauthDraft but also includes claim lifecycle fields.
      properties:
        claim_id:
          type: integer
        payer_code:
          type: string
        policy_number:
          type: string
          nullable: true
        preauth_ref:
          type: string
          nullable: true
          description: Preauth reference stored on the claim. Required for discharge and final claim submission.
        preauth_status:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        source:
          $ref: "#/components/schemas/PreauthSource"
        patient:
          $ref: "#/components/schemas/PreauthPatient"
        admission_date:
          type: string
          format: date
          nullable: true
        discharge_date:
          type: string
          format: date
          nullable: true
          description: Auto-resolved from ipd_discharges when available.
        total_amount:
          type: number
          nullable: true
        diagnoses:
          type: array
          items:
            $ref: "#/components/schemas/PreauthDiagnosis"
        procedures:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcedure"
        items:
          type: array
          items:
            $ref: "#/components/schemas/PreauthLineItem"
        care_team:
          type: array
          items:
            $ref: "#/components/schemas/PreauthCareTeamMember"
        supporting_documents:
          type: array
          items:
            $ref: "#/components/schemas/PreauthSupportingDocument"
        missing_fields:
          type: array
          description: >
            Fields required for claim submission that could not be auto-resolved.
            "preauth_ref" means no approved preauth exists yet.
          items:
            type: string

    DischargeClaimSubmitRequest:
      type: object
      required: [claim_id]
      description: >
        Discharge/provisional claim submission. Only `claim_id` is required.
        Payer, items, diagnoses, procedures, care team, admission date, and
        discharge date are all auto-resolved from DB (same as `claims/prepare`).
        Pass any field only to override the DB-resolved value.
        Requires `preauth_ref` to be stored on the claim — call `claims/prepare`
        first and check `missing_fields` is empty.
      properties:
        request_id:
          type: string
          nullable: true
        claim_id:
          type: integer
        payer_code:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to configured provider id when omitted.
        procedures:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcedure"
        diagnoses:
          type: array
          items:
            $ref: "#/components/schemas/PreauthDiagnosis"
        items:
          type: array
          description: Override for invoice line items. Auto-resolved from ipd_invoices when omitted.
          items:
            $ref: "#/components/schemas/PreauthLineItem"
        care_team:
          type: array
          description: Override for care team. Auto-resolved from ipd_invoices and doctors table when omitted.
          items:
            $ref: "#/components/schemas/PreauthCareTeamMember"

    ClaimSubmitRequest:
      type: object
      required: [claim_id]
      description: >
        Minimal claim submission request. The wrapper rebuilds the NHCX claim
        from DB using `claim_id`. Payer, procedures, and diagnoses are optional
        overrides only when the frontend user corrected the claim draft.
      properties:
        request_id:
          type: string
          nullable: true
        claim_id:
          type: integer
        payer_code:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to configured provider id when omitted.
        procedures:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcedure"
        diagnoses:
          type: array
          items:
            $ref: "#/components/schemas/PreauthDiagnosis"
        supporting_documents:
          type: array
          items:
            $ref: "#/components/schemas/PreauthSupportingDocument"
        questionnaire:
          $ref: "#/components/schemas/FhirQuestionnaire"
        questionnaire_response:
          $ref: "#/components/schemas/FhirQuestionnaireResponse"

    ClaimAcceptedResponse:
      type: object
      properties:
        correlation_id:
          type: string
        status:
          type: string
          example: submitted
        message:
          type: string

    ClaimStatusResponse:
      type: object
      properties:
        correlation_id:
          type: string
        claim_id:
          type: integer
        provider_id:
          type: string
          nullable: true
        workflow:
          type: string
          example: claim
        submitted_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, complete, not_found]
        decision:
          type: string
          nullable: true
          enum: [APPROVED, PARTIALLY_APPROVED, QUERIED, REJECTED, COMPLETED, PARTIAL, UNKNOWN, null]
        approved_amount:
          type: number
          nullable: true
        payment_status:
          type: string
          nullable: true
          description: >
            Payment lifecycle stage from the payer's PaymentNotice.
            Common values: PAYMENT_INITIATED, PAYMENT_SETTLED, null.
        items:
          type: array
          items:
            $ref: "#/components/schemas/PreauthAdjudicationItem"
        totals:
          $ref: "#/components/schemas/PreauthTotals"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/PreauthError"
        process_notes:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcessNote"
        pending_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        completed_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    ReprocessSubmitRequest:
      type: object
      required: [claim_id]
      description: >
        Only `claim_id` is required. Payer is auto-resolved from the claim.
        Eligible when `preauth_status` is REJECTED/QUERIED/PARTIALLY_APPROVED
        OR `claim_decision` is REJECTED/PARTIALLY_APPROVED.
      properties:
        request_id:
          type: string
          nullable: true
        claim_id:
          type: integer
        payer_code:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to configured provider id when omitted.
        reason_code:
          type: string
          enum: [claimrejected, partialpayment, rejectiondisputed, improvedoc, clinicaleva, pricingquery, adminappeal, other]
          default: other
          description: >
            claimrejected — claim was fully rejected; partialpayment — partial
            approval disputed; improvedoc — submitting missing/additional documents;
            clinicaleva — disputing clinical evaluation; pricingquery — pricing
            disagreement; rejectiondisputed — general rejection dispute;
            adminappeal — administrative appeal; other — catch-all.
        description:
          type: string
          nullable: true
        supporting_documents:
          type: array
          items:
            $ref: "#/components/schemas/PreauthSupportingDocument"

    ReprocessAcceptedResponse:
      type: object
      properties:
        correlation_id:
          type: string
        status:
          type: string
          example: submitted
        message:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

    ReprocessStatusResponse:
      type: object
      properties:
        correlation_id:
          type: string
        claim_id:
          type: integer
          nullable: true
        provider_id:
          type: string
          nullable: true
        workflow:
          type: string
          example: reprocess
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, complete, not_found]
        decision:
          type: string
          nullable: true
          enum: [APPROVED, PARTIALLY_APPROVED, QUERIED, REJECTED, UNKNOWN, null]
          description: Payer decision on the reprocess appeal.
        reason_code:
          type: string
          nullable: true
          description: The reason code submitted with the reprocess request.
        claim_response:
          type: object
          nullable: true
          description: >
            Populated when `status: complete`. Contains the payer's adjudication
            detail for the reprocessed claim.
          properties:
            outcome:
              type: string
              nullable: true
            items:
              type: array
              items:
                $ref: "#/components/schemas/PreauthAdjudicationItem"
            totals:
              $ref: "#/components/schemas/PreauthTotals"
            errors:
              type: array
              description: FHIR-level errors from the payer reprocess response.
              items:
                $ref: "#/components/schemas/PreauthError"
        errors:
          type: array
          description: >
            Top-level errors — gateway protocol errors or transaction-level
            failures. Distinct from `claim_response.errors` which are
            FHIR adjudication errors.
          items:
            type: object
            properties:
              code:
                type: string
                nullable: true
              message:
                type: string
                nullable: true
        fhir_bundle:
          type: object
          nullable: true
          description: Raw decrypted FHIR Bundle from the NHCX reprocess callback. Present only when status is complete.
        pending_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        completed_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    PaymentAcknowledgeRequest:
      type: object
      required: [payment_reference]
      description: >
        Only `payment_reference` is required. The payer's payment notice
        (claim reference, settled amount, and UTR) was already stored when the
        payment callback arrived, so `claim_number`, `amount_received`, and `utr`
        are auto-resolved from the stored `nhcx_payment_details` record. Pass any
        of them only to override the stored value.
      properties:
        request_id:
          type: string
          nullable: true
        payment_reference:
          type: string
        claim_number:
          type: string
          nullable: true
          description: Auto-resolved from the stored payment notice's claim reference when omitted.
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to configured provider id when omitted.
        amount_received:
          type: number
          nullable: true
          description: Auto-resolved from the stored payment notice (net/total/notice amount) when omitted.
        utr:
          type: string
          nullable: true
          description: Auto-resolved from the stored payment notice when omitted.

    PaymentAcknowledgeResponse:
      type: object
      properties:
        correlation_id:
          type: string
        status:
          type: string
          example: submitted
        message:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

    PaymentStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, not_found]
        filters:
          type: object
          additionalProperties: true
        latest_stage:
          type: string
          nullable: true
        settled:
          type: boolean
        total_events:
          type: integer
        events:
          type: array
          items:
            $ref: "#/components/schemas/PaymentEvent"

    PaymentEvent:
      type: object
      properties:
        correlation_id:
          type: string
        claim_id:
          type: integer
          nullable: true
        payer_code:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
        payment_reference:
          type: string
          nullable: true
          description: PaymentNotice identifier — primary reference for acknowledgement.
        claim_reference:
          type: string
          nullable: true
          description: Claim identifier extracted from the PaymentReconciliation details.
        event_key:
          type: string
          description: Unique dedup key per payment event (correlation_id:workflow_id:payment_ref:claim_ref:utr).
        payment_stage:
          type: string
          enum: [PAYMENT_INITIATED, PAYMENT_PROCESSED, PAYMENT_SETTLED, UNKNOWN]
          nullable: true
          description: Lifecycle stage driven by workflow_id — 30=INITIATED, 31=PROCESSED, 33=SETTLED.
        workflow_id:
          type: integer
          nullable: true
        # PaymentNotice fields
        notice_identifier:
          type: string
          nullable: true
          description: PaymentNotice.identifier[0].value from the FHIR bundle.
        notice_status:
          type: string
          nullable: true
          description: PaymentNotice.status (e.g. "active").
        notice_amount:
          type: number
          nullable: true
          description: PaymentNotice.amount — payer's declared payment amount.
        notice_created_at:
          type: string
          format: date-time
          nullable: true
          description: PaymentNotice.created — when the payer generated the notice.
        # PaymentReconciliation fields
        recon_identifier:
          type: string
          nullable: true
          description: PaymentReconciliation.identifier[0].value.
        payment_date:
          type: string
          format: date
          nullable: true
          description: PaymentReconciliation.paymentDate — actual payment execution date.
        total_payment_amount:
          type: number
          nullable: true
          description: PaymentReconciliation.paymentAmount — total reconciled amount.
        gross_amount:
          type: number
          nullable: true
          description: Gross amount before TDS, from PaymentReconciliation.detail[] type=Gross.
        tds_amount:
          type: number
          nullable: true
          description: TDS deducted, from PaymentReconciliation.detail[] type=TDS.
        net_payment_amount:
          type: number
          nullable: true
          description: Net credited amount after TDS (gross - tds). Most important for hospital.
        detail_items:
          type: array
          nullable: true
          description: >
            PaymentReconciliation.detail[] — line-item breakdown of the payment.
            Each entry has type, date, amount, identifier, predecessor, and reason.
          items:
            type: object
            properties:
              type:
                type: string
                nullable: true
              type_display:
                type: string
                nullable: true
              date:
                type: string
                nullable: true
              amount:
                type: object
                nullable: true
                properties:
                  value:
                    type: number
                  currency:
                    type: string
              identifier:
                type: string
                nullable: true
              predecessor:
                type: string
                nullable: true
              reason:
                type: string
                nullable: true
        # UTR / currency
        utr:
          type: string
          nullable: true
          description: Unique Transaction Reference from PaymentReconciliation.paymentIdentifier.
        utr_type:
          type: string
          nullable: true
          description: UTR type code (e.g. "NEFT", "IMPS", "RTGS").
        utr_system:
          type: string
          nullable: true
        currency:
          type: string
          nullable: true
          default: INR
        payment_status:
          type: string
          nullable: true
          description: PaymentNotice.paymentStatus coding code (e.g. "cleared").
        # Acknowledgement lifecycle
        acknowledgement_status:
          type: string
          enum: [pending, submitted, failed]
          nullable: true
          description: >
            Auto-acknowledgement lifecycle — "pending" on callback arrival,
            "submitted" after successful NHCX ack, "failed" if ack errored.
            Use `payment/acknowledge` to retry when "failed".
        acknowledgement_correlation_id:
          type: string
          nullable: true
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        acknowledgement_error:
          type: string
          nullable: true
        acknowledgement_attempts:
          type: integer
          nullable: true
        last_acknowledgement_attempt_at:
          type: string
          format: date-time
          nullable: true
        received_at:
          type: string
          format: date-time
          nullable: true
        pending_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        completed_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    FrontendTaskListResponse:
      type: object
      properties:
        total_count:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    FrontendTaskCompletionRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    FrontendTask:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        claim_id:
          type: integer
          nullable: true
        cashless_case_id:
          type: integer
          nullable: true
        child_id:
          type: integer
          nullable: true
        correlation_id:
          type: string
          nullable: true
        workflow:
          type: string
          enum: [insurance_plan, coverage_eligibility, preauth, claim, reprocess, payment, communication]
        task_type:
          type: string
          enum:
            - review_insurance_plan_documents
            - attach_eligibility_documents
            - fix_eligibility_error
            - submit_preauth
            - respond_preauth_query
            - resubmit_preauth
            - submit_discharge_claim
            - submit_final_claim
            - respond_claim_query
            - resubmit_claim
            - submit_reprocess
            - acknowledge_payment
            - review_payment_ack_failure
            - review_communication
        status:
          type: string
          enum: [pending, completed]
        title:
          type: string
        description:
          type: string
          nullable: true
        priority:
          type: string
          enum: [low, normal, high, urgent]
          default: normal
        source:
          type: object
          nullable: true
          properties:
            table:
              type: string
            id:
              oneOf:
                - type: integer
                - type: string
        required_documents:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
                nullable: true
              name:
                type: string
                nullable: true
              display:
                type: string
                nullable: true
              category:
                type: string
                nullable: true
        action:
          type: object
          nullable: true
          properties:
            label:
              type: string
            method:
              type: string
              enum: [GET, POST, PATCH]
            endpoint:
              type: string
            payload_hint:
              type: object
              additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    CommunicationListResponse:
      type: object
      properties:
        total_count:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        communications:
          type: array
          items:
            $ref: "#/components/schemas/CommunicationStatusResponse"

    CommunicationStatusResponse:
      type: object
      properties:
        correlation_id:
          type: string
        workflow:
          type: string
          example: communication
        status:
          type: string
          enum: [complete, not_found]
        payer_code:
          type: string
          nullable: true
          description: HCX participant code of the payer (from Task.owner.reference).
        provider_id:
          type: string
          nullable: true
        # FHIR Task fields
        task_id:
          type: string
          nullable: true
          description: FHIR Task.id from the incoming bundle.
        task_status:
          type: string
          nullable: true
          description: Task.status (e.g. "requested").
        task_intent:
          type: string
          nullable: true
          description: Task.intent (typically "order").
        task_code:
          type: string
          nullable: true
          description: Task.code.coding[0].code (e.g. "communicate").
        task_requester:
          type: string
          nullable: true
          description: Task.requester.display — who initiated the task.
        authored_on:
          type: string
          format: date-time
          nullable: true
          description: Task.authoredOn — when payer created the task.
        task_inputs:
          type: object
          additionalProperties: true
          description: >
            Parsed Task.input[] as key-value pairs. Common keys: claimNumber,
            preAuthRef, claimId — identifies which claim the communication concerns.
        # FHIR Communication fields
        communication_id:
          type: string
          nullable: true
          description: FHIR Communication.id.
        comm_status:
          type: string
          nullable: true
          description: Communication.status (e.g. "completed").
        reason_code:
          type: string
          nullable: true
          enum: [tatquery, grievance, walletupdate, policychange, additionalinfo]
          description: >
            Why the payer sent this communication. tatquery=TAT dispute,
            grievance=complaint, walletupdate=wallet balance change,
            policychange=policy terms changed, additionalinfo=payer needs more info.
        reason_display:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
          description: Communication.category code (e.g. "notification").
        category_display:
          type: string
          nullable: true
        priority:
          type: string
          nullable: true
          enum: [routine, urgent, asap, stat]
        topic:
          type: string
          nullable: true
          description: Communication.topic code.
        topic_display:
          type: string
          nullable: true
        identifier:
          type: string
          nullable: true
          description: Communication.identifier[0].value — payer's reference for this communication.
        subject:
          type: string
          nullable: true
          description: Communication.subject.display — typically a Patient or Claim reference.
        claim_reference:
          type: string
          nullable: true
          description: Claim identifier extracted from task_inputs (claimNumber or claimId).
        sent_at:
          type: string
          format: date-time
          nullable: true
          description: Communication.sent — when the payer sent the message.
        received_at:
          type: string
          format: date-time
          nullable: true
          description: When the backend received the callback.
        payload:
          type: array
          description: >
            Communication.payload[] — the actual message content from the payer.
            Each entry has at most one content type populated.
          items:
            type: object
            properties:
              content_string:
                type: string
                nullable: true
                description: Free-text message content.
              content_attachment:
                type: string
                nullable: true
                description: URL to an attached document (e.g. query letter).
              content_reference:
                type: string
                nullable: true
                description: FHIR reference to another resource.
        workflow_code:
          type: string
          nullable: true
          description: Same as task_code — the workflow type for this communication.
        # Acknowledgement
        acknowledged:
          type: boolean
          description: Whether the backend has sent an acknowledgement to the payer.
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        ack_correlation_id:
          type: string
          nullable: true
        pending_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        completed_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    GatewayStatusRequest:
      type: object
      required: [correlation_id]
      properties:
        request_id:
          type: string
          nullable: true
        correlation_id:
          type: string
        claim_id:
          type: integer
          nullable: true
        payer_code:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to transaction/config provider id when omitted.
        workflow_id:
          oneOf:
            - type: integer
            - type: string
          nullable: true
        use_case:
          type: string
          nullable: true

    GatewayStatusResponse:
      type: object
      properties:
        correlation_id:
          type: string
        status:
          type: string
          example: submitted
        message:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Error family and numeric code in `<family>:<number>` format.
              examples:
                - "WRAPPER-ERROR:1001"
                - "NHCX-ERROR:1003"
            message:
              type: string