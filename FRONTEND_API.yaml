  /cashless/preauth/enhancement/prepare:
    get:
      tags: [Preauthorization]
      operationId: preparePreauthEnhancement
      summary: Preview what changed since the approved preauth
      description: >
        Use this BEFORE `POST /cashless/preauth/enhancement`. The frontend does
        not know what treatment scope was added after the original preauth was
        approved — this endpoint computes the delta. The wrapper re-derives the
        live clinical and billing record from DB (latest `ipd_clinical_notes`,
        revised `ipd_invoices`, discharge date) and diffs it against the snapshot
        of the last submitted/approved preauth for the same `claim_id`.
        The response lists `new_procedures[]` and `new_items[]` (scope present now
        but not in the original authorization), the `delta_amount`, and a
        `suggested_request` body. The frontend shows these, lets the user pick
        which new lines to include, and submits the selection to
        `/cashless/preauth/enhancement`.
        `enhanceable` is false (with a `reason`) when no prior preauth exists or
        nothing new was found — the UI should disable the enhancement action then.
      parameters:
        - name: claim_id
          in: query
          required: true
          schema:
            type: integer
        - name: admission_id
          in: query
          required: false
          schema:
            type: integer
        - name: child_id
          in: query
          required: false
          schema:
            type: integer
        - name: payer_code
          in: query
          required: false
          schema:
            type: string
        - name: policy_number
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Enhancement preview (delta vs. authorized preauth)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreauthEnhancementPreview"
              examples:
                additional_scope:
                  value:
                    claim_id: 101
                    payer_code: "1518@hcx"
                    policy_number: "POL-91711234567890-2026"
                    preauth_ref: "PA-2026-00001"
                    enhanceable: true
                    reason: null
                    authorized:
                      total_amount: 50000
                      approved_amount: 40000
                      procedures:
                        - code: "47562"
                          name: "Laparoscopic cholecystectomy"
                      items:
                        - service_code: "PKG-LAP-CHOLE"
                          service_name: "Laparoscopic cholecystectomy package"
                          quantity: 1
                          unit_price: 50000
                          net_amount: 50000
                    current:
                      total_amount: 75000
                      procedures:
                        - code: "47562"
                          name: "Laparoscopic cholecystectomy"
                        - code: "44970"
                          name: "Laparoscopic appendectomy"
                      items:
                        - service_code: "PKG-LAP-CHOLE"
                          service_name: "Laparoscopic cholecystectomy package"
                          quantity: 1
                          unit_price: 50000
                          net_amount: 50000
                        - service_code: "PKG-LAP-APPE"
                          service_name: "Laparoscopic appendectomy package"
                          quantity: 1
                          unit_price: 25000
                          net_amount: 25000
                    new_procedures:
                      - code: "44970"
                        name: "Laparoscopic appendectomy"
                        date: "2026-05-06"
                        is_new: true
                    new_items:
                      - service_code: "PKG-LAP-APPE"
                        service_name: "Laparoscopic appendectomy package"
                        category: "SE"
                        quantity: 1
                        unit_price: 25000
                        net_amount: 25000
                        is_new: true
                    delta_amount: 25000
                    supporting_documents:
                      - category: "revised_estimate"
                        name: "Revised Estimate"
                        code: "REVISED_ESTIMATE"
                        event_date: "2026-05-06"
                        url: null
                    missing_fields: []
                    suggested_request:
                      claim_id: 101
                      total_amount: 75000
                      items:
                        - service_code: "PKG-LAP-CHOLE"
                          service_name: "Laparoscopic cholecystectomy package"
                          quantity: 1
                          unit_price: 50000
                          net_amount: 50000
                        - service_code: "PKG-LAP-APPE"
                          service_name: "Laparoscopic appendectomy package"
                          quantity: 1
                          unit_price: 25000
                          net_amount: 25000
                nothing_new:
                  value:
                    claim_id: 101
                    preauth_ref: "PA-2026-00001"
                    enhanceable: false
                    reason: "No new procedures or billing found since the approved preauth."
                    authorized:
                      total_amount: 50000
                      approved_amount: 40000
                      procedures: []
                      items: []
                    current:
                      total_amount: 50000
                      procedures: []
                      items: []
                    new_procedures: []
                    new_items: []
                    delta_amount: 0
                    missing_fields: []
        "404":
          description: No approved/submitted preauth to enhance for this claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cashless/preauth/enhancement:
    post:
      tags: [Preauthorization]
      operationId: submitPreauthEnhancement
      summary: Submit preauthorization enhancement
      description: >
        Use when the patient's treatment scope increases beyond what was originally
        authorized — additional procedures, upgraded surgery, or extended stay.
        Triggers UC3 enhancement workflow. The wrapper auto-resolves the latest
        clinical and billing data from DB (including discharge date from
        `ipd_discharges`, additional procedures from updated `ipd_clinical_notes`,
        revised invoice total, and referring doctors from the invoice).
        Pass only the fields that changed; everything else is re-derived from DB.
        Requires a prior successful `preauth/submit` for the same `claim_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreauthSubmitRequest"
            examples:
              minimal:
                value:
                  claim_id: 101
              with_updated_amount:
                value:
                  claim_id: 101
                  total_amount: 75000
                  items:
                    - service_code: "PKG-LAP-CHOLE"
                      service_name: "Laparoscopic cholecystectomy package"
                      category: "SE"
                      quantity: 1
                      unit_price: 75000
                      net_amount: 75000
                  supporting_documents:
                    - category: "revised_estimate"
                      name: "Revised Estimate"
                      code: "REVISED_ESTIMATE"
                      event_date: "2026-05-06"
                      url: "https://hospital.example/records/101/revised-estimate.pdf"
      responses:
        "202":
          description: Preauth enhancement submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreauthAcceptedResponse"
              examples:
                accepted:
                  value:
                    correlation_id: "7a3b9c21-f1e2-4d5a-b6c7-8e9f0a1b2c3d"
                    preauth_ref: null
                    policy_number: "POL-91711234567890-2026"
                    status: "submitted"
                    message: "Pre-authorization enhancement submitted"

