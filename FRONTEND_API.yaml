                          net_amount: 25000
                nothing_new:
                  value:
                    claim_id: 101
                    preauth_ref: "PA-2026-00001"
                    enhanceable: false
                    reason: "No new procedures or billing found since the approved preauth."
                    authorized:
                      total_amount: 50000
                      approved_amount: 40000
                      procedures: []
                      items: []
                    current:
                      total_amount: 50000
                      procedures: []
                      items: []
                    new_procedures: []
                    new_items: []
                    delta_amount: 0
                    missing_fields: []
        "404":
          description: No approved/submitted preauth to enhance for this claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cashless/preauth/enhancement:
    post:
      tags: [Preauthorization]
      operationId: submitPreauthEnhancement
      summary: Submit preauthorization enhancement
      parameters:
        - $ref: "#/components/parameters/ProviderIdHeader"
      description: >
        Use when the patient's treatment scope increases beyond what was originally
        authorized — additional procedures, upgraded surgery, or extended stay.
        Triggers UC3 enhancement workflow. The wrapper auto-resolves the latest
        clinical and billing data from DB (including discharge date from
        `ipd_discharges`, additional procedures from updated `ipd_clinical_notes`,
        revised invoice total, and referring doctors from the invoice).
        Pass only the fields that changed; everything else is re-derived from DB.
        Requires a prior successful `preauth/submit` for the same `claim_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreauthSubmitRequest"
            examples:
              minimal:
                value:
                  claim_id: 101
              with_updated_amount:
                value:
                  claim_id: 101
                  total_amount: 75000
                  items:
                    - service_code: "PKG-LAP-CHOLE"
                      service_name: "Laparoscopic cholecystectomy package"
                      category: "SE"
                      quantity: 1
                      unit_price: 75000
                      net_amount: 75000
                  supporting_documents:
                    - category: "revised_estimate"
                      name: "Revised Estimate"
                      code: "REVISED_ESTIMATE"
                      event_date: "2026-05-06"
                      url: "https://hospital.example/records/101/revised-estimate.pdf"
      responses:
        "202":
          description: Preauth enhancement submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreauthAcceptedResponse"
              examples:
                accepted:
                  value:
                    correlation_id: "7a3b9c21-f1e2-4d5a-b6c7-8e9f0a1b2c3d"
                    preauth_ref: null
                    policy_number: "POL-91711234567890-2026"
                    status: "submitted"
                    message: "Pre-authorization enhancement submitted"

  /cashless/preauth/resubmit:
    post:
      tags: [Preauthorization]
      operationId: resubmitPreauth
      summary: Resubmit preauthorization request
      parameters:
        - $ref: "#/components/parameters/ProviderIdHeader"
      description: >
        Use after `preauth/status` returns `decision: QUERIED` or `REJECTED` when
        the hospital is correcting clinical/billing data (not answering a payer
        questionnaire — use `query-response` for that). Triggers UC3 wf=121.
        Requires a prior `preauth/submit` for the same `claim_id`.
        Pass only the fields being corrected; everything else is re-derived from DB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreauthSubmitRequest"
            examples:
              corrected_package:
                value:
                  claim_id: 101
                  payer_id: "1518@hcx"
                  policy_number: "POL-91711234567890-2026"
                  diagnoses:
                    - code: "K80.20"
                      name: "Calculus of gallbladder"
                      primary: true
                      on_admission: true
                  items:
                    - service_code: "47562"
                      service_name: "Laparoscopic cholecystectomy"
                      category: "SE"
                      quantity: 1
                      unit_price: 45000
                      net_amount: 45000
                  total_amount: 45000
      responses:
        "202":
          description: Preauth resubmitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreauthAcceptedResponse"
              examples:
                accepted:
                  value:
                    correlation_id: "8d2fd8d9-c8a1-4f3c-9ac8-8de7bdf95c44"
                    preauth_ref: null
                    policy_number: "POL-91711234567890-2026"
                    status: "submitted"
                    message: "Preauthorization resubmission submitted"

  /cashless/preauth/query-response:
    post:
      tags: [Preauthorization]
      operationId: respondPreauthQuery
      summary: Respond to preauthorization query
      parameters:
        - $ref: "#/components/parameters/ProviderIdHeader"
      description: >
        Use after `preauth/status` returns `decision: QUERIED` AND the payer has
        sent a questionnaire URL in `process_notes`. Send `questionnaire_response`
        with structured answers plus `supporting_documents` the payer requested.
        For corrections without a questionnaire, use `preauth/resubmit` instead.
        Requires a prior `preauth/submit` for the same `claim_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreauthSubmitRequest"
            examples:
              document_response:
                value:
                  claim_id: 101
                  payer_id: "1518@hcx"
                  policy_number: "POL-91711234567890-2026"
                  supporting_documents:
                    - category: "investigation"
                      name: "Investigation Report"
                      code: "INVESTIGATION_REPORT"
                      event_date: "2026-05-04"
                      url: "https://hospital.example/records/101/investigation-report.pdf"
                  questionnaire_response:
                    questionnaire: "https://payer.gov.in/policy/questionnaire/119/0"
                    status: "completed"
                    item:
                      - linkId: "query-1"
                        text: "Clinical justification"
                        answer:
                          - valueString: "Investigation report attached and diagnosis confirmed."
      responses:
        "202":
          description: Preauth query response submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreauthAcceptedResponse"
              examples:
                accepted:
                  value:
                    correlation_id: "92718f2b-c9fb-4cfd-88de-1028f92735b2"
                    preauth_ref: null
                    policy_number: "POL-91711234567890-2026"
                    status: "submitted"
                    message: "Preauthorization query response submitted"

  /cashless/preauth/cancel:
    post:
      tags: [Preauthorization]
      operationId: cancelPreauth
      summary: Cancel preauthorization
      parameters:
        - $ref: "#/components/parameters/ProviderIdHeader"
      description: >
        Use when a preauth must be cancelled before discharge — patient withdraws,
        treatment plan changes, or administrative error. Triggers UC3 wf=122.
        Requires a prior approved or pending preauth (`preauth_ref` must exist on
        the claim; auto-resolved from `claim.preauth_ref` when omitted).
        Calling this without a stored `preauth_ref` will return a 400 error.


        **After the payer acknowledges the cancellation**, `preauth/status` reports
        `decision: CANCELLED` and the case's `preauth_status` becomes `CANCELLED`
        (`current_step` returns to `preauth_decided`). Any `submit_discharge_claim` /
        `submit_final_claim` tasks are withdrawn — the UI should treat the preauth
        as void and not offer claim actions on it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreauthCancelRequest"
            examples:
              patient_request:
                value:
                  claim_id: 101
                  payer_id: "1518@hcx"
                  preauth_ref: "PA-2026-00001"
                  reason: "patientrequest"
                  description: "Patient requested cancellation"
      responses:
        "202":
          description: Preauth cancellation submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreauthAcceptedResponse"
              examples:
                accepted:
                  value:
                    correlation_id: "b05fd989-e852-4542-8476-e6ac99e709cb"
                    preauth_ref: "PA-2026-00001"
                    policy_number: null
                    status: "submitted"
                    message: "Preauthorization cancellation submitted"

