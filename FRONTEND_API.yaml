  /cashless/claims/{claim_id}/patient-context:
    patch:
      tags: [Claims]
      operationId: setClaimPatientContext
      summary: Supply patient/admission attributes the hospital DB cannot provide
      description: >
        NHCX requires a beneficiary identifier (ABHA number or PMJAY member id),
        patient DOB, and admission/discharge dates. When these are not resolvable
        from the hospital DB, `preauth/prepare` and `claims/prepare` list them in
        `missing_fields` (e.g. `patient.identifier`, `patient.dob`, `admission_date`).
        Use this endpoint to supply them. The values are persisted on the cashless
        case and merged into every subsequent preauth/claim draft and submission —
        no need to resend them on submit. Returns the refreshed `missing_fields`
        so the UI can confirm the blockers are cleared before submitting.
        Only the fields you pass are updated; omitted fields keep their stored value.
      parameters:
        - name: claim_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientContextRequest"
            examples:
              member_id:
                value:
                  patient_context:
                    member_id: "PMJAY-MEM-00123"
              full:
                value:
                  patient_context:
                    abha: "91-7112-3456-7890"
                    member_id: "PMJAY-MEM-00123"
                    dob: "2018-04-12"
                    admission_date: "2026-05-04"
      responses:
        "200":
          description: Patient context stored; refreshed draft validation returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientContextResponse"
              examples:
                cleared:
                  value:
                    claim_id: 101
                    status: "updated"
                    patient_context:
                      patient_member_id: "PMJAY-MEM-00123"
                      patient_dob: "2018-04-12"
                    missing_fields: []
        "400":
          description: No supported patient context attributes provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

