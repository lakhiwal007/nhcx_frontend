                        detail_sequence: 1
                        adjudication:
                          submitted:
                            value: 50000
                            currency: "INR"
                          eligible:
                            value: 45000
                            currency: "INR"
                          benefit:
                            value: 40000
                            currency: "INR"
                          copay:
                            value: 5000
                            currency: "INR"
                          deductible: null
                        notes: [1]
                    totals:
                      submitted:
                        value: 50000
                        currency: "INR"
                      eligible:
                        value: 45000
                        currency: "INR"
