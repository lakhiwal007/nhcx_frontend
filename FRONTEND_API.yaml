        clinical_findings:
          type: array
          description: Coded findings from `ipd_clinical_notes.finding_ids`.
          items:
            $ref: "#/components/schemas/ClinicalCode"
        missing_fields:
          type: array
          description: >
            Fields required for claim submission that could not be auto-resolved.
            "preauth_ref" means no approved preauth exists yet.
          items:
            type: string

    DischargeClaimSubmitRequest:
      type: object
      required: [request_id, claim_id]
      description: >
        Discharge/provisional claim submission. Only `claim_id` is required.
        Payer, items, diagnoses, procedures, care team, admission date, and
        discharge date are all auto-resolved from DB (same as `claims/prepare`).
        Pass any field only to override the DB-resolved value.
        Requires `preauth_ref` to be stored on the claim — call `claims/prepare`
        first and check `missing_fields` is empty.
      properties:
        request_id:
          type: string
          description: Mandatory client-generated request id (UUID recommended).
        claim_id:
          type: integer
        payer_id:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to configured provider id when omitted.
        procedures:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcedure"
        diagnoses:
          type: array
          items:
            $ref: "#/components/schemas/PreauthDiagnosis"
        items:
          type: array
          description: Override for invoice line items. Auto-resolved from ipd_invoices when omitted.
          items:
            $ref: "#/components/schemas/PreauthLineItem"
        care_team:
          type: array
          description: Override for care team. Auto-resolved from ipd_invoices and doctors table when omitted.
          items:
            $ref: "#/components/schemas/PreauthCareTeamMember"
        questionnaire:
          $ref: "#/components/schemas/FhirQuestionnaire"
          nullable: true
          description: Payer questionnaire definition (URL or embedded). Pass only when the payer sent one with the preauth query.
        questionnaire_response:
          $ref: "#/components/schemas/FhirQuestionnaireResponse"
          nullable: true
          description: Completed answers to the payer questionnaire.

    ClaimSubmitRequest:
      type: object
      required: [request_id, claim_id]
      description: >
        Minimal claim submission request. The wrapper rebuilds the NHCX claim
        from DB using `claim_id`. Payer, procedures, and diagnoses are optional
        overrides only when the frontend user corrected the claim draft.
      properties:
        request_id:
          type: string
          description: Mandatory client-generated request id (UUID recommended).
        claim_id:
          type: integer
        payer_id:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to configured provider id when omitted.
        procedures:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcedure"
        diagnoses:
          type: array
          items:
            $ref: "#/components/schemas/PreauthDiagnosis"
        supporting_documents:
          type: array
          items:
            $ref: "#/components/schemas/PreauthSupportingDocument"
        questionnaire:
          $ref: "#/components/schemas/FhirQuestionnaire"
        questionnaire_response:
          $ref: "#/components/schemas/FhirQuestionnaireResponse"

    ClaimAcceptedResponse:
      type: object
      properties:
        correlation_id:
          type: string
        status:
          type: string
          example: submitted
        message:
          type: string

    ClaimStatusResponse:
      type: object
      properties:
        correlation_id:
          type: string
        cashless_case_id:
          type: integer
          nullable: true
          description: The originating cashless case linked at claim-submit time.
        claim_id:
          type: integer
          nullable: true
        provider_id:
          type: string
          nullable: true
        workflow:
          type: string
          example: claim
        submitted_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, complete, failed, not_found]
          description: >
            `failed` means the gateway rejected the request at the protocol
            level (e.g. payer unreachable) before any claim decision was
            recorded — a terminal state, not a transient one.
            `error_code`/`error_message` are populated when `failed`.
        error_code:
          type: string
          nullable: true
          description: Gateway/payer error code (e.g. NHCX-1001). Present only when `status` is `failed`.
        error_message:
          type: string
          nullable: true
          description: >
            Verbatim message from the gateway/payer, not paraphrased — safe
            to show directly to staff. Present only when `status` is `failed`.
        decision:
          type: string
          nullable: true
          enum: [APPROVED, PARTIALLY_APPROVED, QUERIED, REJECTED, COMPLETED, PARTIAL, UNKNOWN, null]
          description: >
            Classified payer verdict. Derived from the authoritative NHCX callback
            workflow id (e.g. claim rejected/queried) and not re-inferred from the
            FHIR bundle, so a reject or query is never reported as `APPROVED` even
            when the payer's bundle omits the matching outcome/reason codes. A claim
            rejection delivered on any workflow id is routed and surfaced here. On
            `REJECTED` the underlying claim record's lifecycle status reverts to
            `draft` (re-editable); `APPROVED`/`PARTIALLY_APPROVED` move it to
            `submitted`; `QUERIED` leaves it unchanged.
            **This field alone does not say whether the rejection was on a
            discharge (interim) submission or a final claim** — both report
            `decision: REJECTED` here identically. Use `pending_tasks[].task_type`
            to tell them apart: `resubmit_discharge_claim` means correct and
            resend via `claims/discharge/resubmit` (DC01); `resubmit_claim` +
            `submit_reprocess` means the final claim was rejected. Always drive
            the resubmit/reprocess UI off the task, not off `decision` alone.
        outcome:
          type: string
          nullable: true
          description: Raw FHIR outcome from the payer (complete, partial, error, queued). Distinct from `decision` which is the classified business decision.
        approved_amount:
          type: number
          nullable: true
        payment_status:
          type: string
          nullable: true
          description: >
            Payment lifecycle stage from the payer's PaymentNotice.
            Common values: PAYMENT_INITIATED, PAYMENT_SETTLED, null.
        claim_response_ref:
          type: string
          nullable: true
          description: Payer's claim response identifier from the ClaimResponse FHIR resource identifier field.
        procedures:
          type: array
          nullable: true
          items:
            type: object
        diagnoses:
          type: array
          nullable: true
          items:
            type: object
        claim_items:
          type: array
          nullable: true
          items:
            type: object
        items:
          type: array
          items:
            $ref: "#/components/schemas/PreauthAdjudicationItem"
        totals:
          $ref: "#/components/schemas/PreauthTotals"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/PreauthError"
        process_notes:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcessNote"
        pending_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        completed_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    ReprocessSubmitRequest:
      type: object
      required: [request_id, claim_id]
      description: >
        Only `claim_id` is required. Payer is auto-resolved from the claim.
        Eligible when `preauth_status` is one of REJECTED/QUERIED/PARTIALLY_APPROVED,
        OR `claim_decision` is REJECTED/PARTIALLY_APPROVED (note: QUERIED claim
        decisions are not eligible for reprocess — use `claims/query-response` instead).
      properties:
        request_id:
          type: string
          description: Mandatory client-generated request id (UUID recommended).
        claim_id:
          type: integer
        payer_id:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to configured provider id when omitted.
        reason_code:
          type: string
          enum: [claimrejected, partialpayment, rejectiondisputed, improvedoc, clinicaleva, pricingquery, adminappeal, other]
          default: other
          description: >
            claimrejected — claim was fully rejected; partialpayment — partial
            approval disputed; improvedoc — submitting missing/additional documents;
            clinicaleva — disputing clinical evaluation; pricingquery — pricing
            disagreement; rejectiondisputed — general rejection dispute;
            adminappeal — administrative appeal; other — catch-all.
        description:
          type: string
          nullable: true
        supporting_documents:
          type: array
          items:
            $ref: "#/components/schemas/PreauthSupportingDocument"

    ReprocessAcceptedResponse:
      type: object
      properties:
        correlation_id:
          type: string
        status:
          type: string
          example: submitted
        message:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

    ReprocessStatusResponse:
      type: object
      properties:
        correlation_id:
          type: string
        cashless_case_id:
          type: integer
          nullable: true
          description: The originating cashless case, when the reprocess targets a pre-auth-only claim.
        claim_id:
          type: integer
          nullable: true
        provider_id:
          type: string
          nullable: true
        workflow:
          type: string
          example: reprocess
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, complete, failed, not_found]
          description: >
            `failed` means the gateway or payer rejected the request at the
            protocol level (e.g. payer unreachable) — a terminal state, not a
            transient one. `errors[].message` is the verbatim message from the
            gateway/payer, not paraphrased — safe to show directly to staff.
        decision:
          type: string
          nullable: true
          enum: [APPROVED, PARTIALLY_APPROVED, QUERIED, REJECTED, UNKNOWN, null]
          description: Payer decision on the reprocess appeal.
        reason_code:
          type: string
          nullable: true
          enum: [claimrejected, partialpayment, rejectiondisputed, improvedoc, clinicaleva, pricingquery, adminappeal, other, null]
          description: The reason code submitted with the reprocess request.
        fhir_bundle:
          type: object
          nullable: true
          description: Raw decrypted FHIR Bundle from the NHCX reprocess callback. Present only when status is complete.
        claim_response:
          type: object
          nullable: true
          description: >
            Populated when `status: complete`. Contains the payer's adjudication
            detail for the reprocessed claim.
          properties:
            outcome:
              type: string
              nullable: true
            items:
              type: array
              items:
                $ref: "#/components/schemas/PreauthAdjudicationItem"
            totals:
              $ref: "#/components/schemas/PreauthTotals"
            errors:
              type: array
              description: FHIR-level errors from the payer reprocess response.
              items:
                $ref: "#/components/schemas/PreauthError"
        errors:
          type: array
          description: >
            Top-level errors — gateway protocol errors or transaction-level
            failures. Distinct from `claim_response.errors` which are
            FHIR adjudication errors.
          items:
            type: object
            properties:
              code:
                type: string
                nullable: true
              message:
                type: string
                nullable: true
        pending_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        completed_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    PaymentAcknowledgeRequest:
      type: object
      required: [request_id, payment_reference]
      description: >
        Only `payment_reference` is required. The payer's payment notice
        (claim reference, settled amount, and UTR) was already stored when the
        payment callback arrived, so `claim_number`, `amount_received`, and `utr`
        are auto-resolved from the stored `nhcx_payment_details` record. Pass any
        of them only to override the stored value.
      properties:
        request_id:
          type: string
          description: Mandatory client-generated request id (UUID recommended).
        payment_reference:
          type: string
        claim_number:
          type: string
          nullable: true
          description: Auto-resolved from the stored payment notice's claim reference when omitted.
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to configured provider id when omitted.
        amount_received:
          type: number
          nullable: true
          description: Auto-resolved from the stored payment notice (net/total/notice amount) when omitted.
        utr:
          type: string
          nullable: true
          description: Auto-resolved from the stored payment notice when omitted.

    PaymentAcknowledgeResponse:
      type: object
      properties:
        correlation_id:
          type: string
        status:
          type: string
          example: submitted
        message:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

    PaymentStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, not_found]
        filters:
          type: object
          additionalProperties: true
        latest_stage:
          type: string
          nullable: true
        settled:
          type: boolean
        total_events:
          type: integer
        events:
          type: array
          items:
            $ref: "#/components/schemas/PaymentEvent"

    PaymentEvent:
      type: object
      properties:
        correlation_id:
          type: string
        claim_id:
          type: integer
          nullable: true
        payer_id:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
        payment_reference:
          type: string
          nullable: true
          description: PaymentNotice identifier — primary reference for acknowledgement.
        claim_reference:
          type: string
          nullable: true
          description: Claim identifier extracted from the PaymentReconciliation details.
        event_key:
          type: string
          description: Unique dedup key per payment event (correlation_id:workflow_id:payment_ref:claim_ref:utr).
        payment_stage:
          type: string
          enum: [PAYMENT_INITIATED, PAYMENT_PROCESSED, PAYMENT_SETTLED, UNKNOWN]
          nullable: true
          description: Lifecycle stage driven by workflow_id — 30=INITIATED, 31=PROCESSED, 33=SETTLED.
        workflow_id:
          type: integer
          nullable: true
        # PaymentNotice fields
        notice_identifier:
          type: string
          nullable: true
          description: PaymentNotice.identifier[0].value from the FHIR bundle.
        notice_status:
          type: string
          nullable: true
          description: PaymentNotice.status (e.g. "active").
        notice_amount:
          type: number
          nullable: true
          description: PaymentNotice.amount — payer's declared payment amount.
        notice_created_at:
          type: string
          format: date-time
          nullable: true
          description: PaymentNotice.created — when the payer generated the notice.
        # PaymentReconciliation fields
        recon_identifier:
          type: string
          nullable: true
          description: PaymentReconciliation.identifier[0].value.
        payment_date:
          type: string
          format: date
          nullable: true
          description: PaymentReconciliation.paymentDate — actual payment execution date.
        total_payment_amount:
          type: number
          nullable: true
          description: PaymentReconciliation.paymentAmount — total reconciled amount.
        gross_amount:
          type: number
          nullable: true
          description: Gross amount before TDS, from PaymentReconciliation.detail[] type=Gross.
        tds_amount:
          type: number
          nullable: true
          description: TDS deducted, from PaymentReconciliation.detail[] type=TDS.
        net_payment_amount:
          type: number
          nullable: true
          description: Net credited amount after TDS (gross - tds). Most important for hospital.
        detail_items:
          type: array
          nullable: true
          description: >
            PaymentReconciliation.detail[] — line-item breakdown of the payment.
            Each entry has type, date, amount, identifier, predecessor, and reason.
          items:
            type: object
            properties:
              type:
                type: string
                nullable: true
              type_display:
                type: string
                nullable: true
              date:
                type: string
                nullable: true
              amount:
                type: object
                nullable: true
                properties:
                  value:
                    type: number
                  currency:
                    type: string
              identifier:
                type: string
                nullable: true
              predecessor:
                type: string
                nullable: true
              reason:
                type: string
                nullable: true
        # UTR / currency
        utr:
          type: string
          nullable: true
          description: Unique Transaction Reference from PaymentReconciliation.paymentIdentifier.
        utr_type:
          type: string
          nullable: true
          description: UTR type code (e.g. "NEFT", "IMPS", "RTGS").
        utr_system:
          type: string
          nullable: true
        currency:
          type: string
          nullable: true
          default: INR
        payment_status:
          type: string
          nullable: true
          description: PaymentNotice.paymentStatus coding code (e.g. "cleared").
        # Acknowledgement lifecycle
        acknowledgement_status:
          type: string
          enum: [pending, submitted, failed]
          nullable: true
          description: >
            Auto-acknowledgement lifecycle — "pending" on callback arrival,
            "submitted" after successful NHCX ack, "failed" if ack errored.
            Use `payment/acknowledge` to retry when "failed".
        acknowledgement_correlation_id:
          type: string
          nullable: true
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        acknowledgement_error:
          type: string
          nullable: true
        acknowledgement_attempts:
          type: integer
          nullable: true
        last_acknowledgement_attempt_at:
          type: string
          format: date-time
          nullable: true
        received_at:
          type: string
          format: date-time
          nullable: true
        pending_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        completed_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    FrontendTaskListResponse:
      type: object
      properties:
        total_count:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    FrontendTaskCompletionRequest:
      type: object
      required: [request_id]
      properties:
        request_id:
          type: string
          description: Mandatory client-generated request id (UUID recommended).
        note:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    FrontendTask:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        claim_id:
          type: integer
          nullable: true
        cashless_case_id:
          type: integer
          nullable: true
        child_id:
          type: integer
          nullable: true
        correlation_id:
          type: string
          nullable: true
        workflow:
          type: string
          enum: [insurance_plan, coverage_eligibility, preauth, claim, reprocess, payment, communication]
        task_type:
          type: string
          enum:
            - review_insurance_plan_documents
            - attach_eligibility_documents
            - fix_eligibility_error
            - submit_preauth
            - respond_preauth_query
            - resubmit_preauth
            - submit_discharge_claim
            - submit_final_claim
            - respond_claim_query
            - resubmit_claim
            - resubmit_discharge_claim
            - submit_reprocess
            - acknowledge_payment
            - review_payment_ack_failure
            - review_communication
        status:
          type: string
          enum: [pending, completed]
        title:
          type: string
        description:
          type: string
          nullable: true
        priority:
          type: string
          enum: [low, normal, high, urgent]
          default: normal
        source:
          type: object
          nullable: true
          properties:
            table:
              type: string
            id:
              oneOf:
                - type: integer
                - type: string
        required_documents:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
                nullable: true
              name:
                type: string
                nullable: true
              display:
                type: string
                nullable: true
              category:
                type: string
                nullable: true
        action:
          type: object
          nullable: true
          description: >
            The ready-to-run action for this task. Use `action.code` to look up
            the target URL and HTTP method in the frontend's ACTION_MAP constant —
            do NOT call `action.endpoint` directly. `endpoint` is kept for
            debugging and backwards compatibility only; it will be removed once
            all clients use `code`.
            For `review_communication` tasks the backend resolves the correct
            `code` at task-creation time based on the linked claim's state:
            — `additionalinfo` when `preauth_status = QUERIED` → code `respond_preauth_query`
            — `additionalinfo` when `claim_decision = QUERIED` → code `respond_claim_query`
            — `additionalinfo` when status is REJECTED/PARTIALLY_APPROVED → code `submit_reprocess`
            — all other reason codes or unresolvable claim → code `review_communication` (read only).
          properties:
            label:
              type: string
              description: Human-readable button label (e.g. "Respond to query").
            code:
              type: string
              description: >
                Stable semantic action identifier. Map this to the target URL and
                HTTP method in the frontend ACTION_MAP. Unlike `endpoint`, codes
                are never renamed when backend routes change.
              enum:
                - respond_preauth_query
                - resubmit_preauth
                - submit_preauth
                - respond_claim_query
                - resubmit_claim
                - resubmit_discharge_claim
                - submit_discharge_claim
                - submit_final_claim
                - submit_reprocess
                - acknowledge_payment
                - review_communication
                - attach_eligibility_documents
                - fix_eligibility_error
                - review_insurance_plan_documents
            method:
              type: string
              enum: [GET, POST, PATCH]
              description: HTTP method hint. Prefer the ACTION_MAP over this field.
            endpoint:
              type: string
              description: >
                Deprecated. Raw API path kept for backwards compatibility and
                debugging. Use `code` + the frontend ACTION_MAP instead. Will
                be removed in a future version.
            payload_hint:
              type: object
              additionalProperties: true
              description: >
                Seed the request body from this object; merge user edits on top.
                For preauth corrective tasks (`resubmit_preauth`,
                `respond_preauth_query`) the hint carries `cashless_case_id` in
                addition to `claim_id` — in the case-first flow `claim_id` is null
                and these endpoints act on the case, so use `cashless_case_id` then.
                `submit_reprocess` is only ever offered once an adjudicated claim
                exists (its hint always has a non-null `claim_id`) — a rejected
                discharge (interim) claim gets `resubmit_discharge_claim`
                instead, never `resubmit_claim` + `submit_reprocess`.
        metadata:
          type: object
          additionalProperties: true
          description: >
            Extra context for the frontend. For `review_communication` tasks
            this includes: `reason_code`, `claim_reference`, `task_inputs`,
            `claim_id`, `preauth_status`, `claim_decision`, and `workflow_code`
            — everything the frontend needs to contextualise the communication
            and deep-link to the affected case without calling another endpoint.
        created_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    CommunicationListResponse:
      type: object
      properties:
        total_count:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        communications:
          type: array
          items:
            $ref: "#/components/schemas/CommunicationStatusResponse"

    CommunicationStatusResponse:
      type: object
      properties:
        correlation_id:
          type: string
        workflow:
          type: string
          example: communication
        status:
          type: string
          enum: [complete, not_found]
        payer_id:
          type: string
          nullable: true
          description: HCX participant code of the payer (from Task.owner.reference).
        provider_id:
          type: string
          nullable: true
        # FHIR Task fields
        task_id:
          type: string
          nullable: true
          description: FHIR Task.id from the incoming bundle.
        task_status:
          type: string
          nullable: true
          description: Task.status (e.g. "requested").
        task_intent:
          type: string
          nullable: true
          description: Task.intent (typically "order").
        task_code:
          type: string
          nullable: true
          description: Task.code.coding[0].code (e.g. "communicate").
        task_requester:
          type: string
          nullable: true
          description: Task.requester.display — who initiated the task.
        authored_on:
          type: string
          format: date-time
          nullable: true
          description: Task.authoredOn — when payer created the task.
        task_inputs:
          type: object
          additionalProperties: true
          description: >
            Parsed Task.input[] as key-value pairs. Common reference keys:
            `claimNumber`, `claimId` — identify which claim the communication
            concerns. All other keys are document-type codes the payer is
            requesting (e.g. `INVESTIGATION_REPORT`, `DISCHARGE_SUMMARY`).
            The `review_communication` task's `required_documents[]` is
            pre-populated from these non-reference keys so the frontend can
            show a document checklist without parsing task_inputs itself.
        # FHIR Communication fields
        communication_id:
          type: string
          nullable: true
          description: FHIR Communication.id.
        comm_status:
          type: string
          nullable: true
          description: Communication.status (e.g. "completed").
        reason_code:
          type: string
          nullable: true
          enum: [tatquery, grievance, walletupdate, policychange, additionalinfo]
          description: >
            Why the payer sent this communication. tatquery=TAT dispute,
            grievance=complaint, walletupdate=wallet balance change,
            policychange=policy terms changed, additionalinfo=payer needs more info.
        reason_display:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
          description: Communication.category code (e.g. "notification").
        category_display:
          type: string
          nullable: true
        priority:
          type: string
          nullable: true
          enum: [routine, urgent, asap, stat]
        topic:
          type: string
          nullable: true
          description: Communication.topic code.
        topic_display:
          type: string
          nullable: true
        identifier:
          type: string
          nullable: true
          description: Communication.identifier[0].value — payer's reference for this communication.
        subject:
          type: string
          nullable: true
          description: Communication.subject.display — typically a Patient or Claim reference.
        claim_reference:
          type: string
          nullable: true
          description: >
            Payer's claim reference extracted from task_inputs (claimNumber or
            claimId). Used by the backend to look up the hospital Claim via
            `preauth_ref` or `claim_response_ref` and auto-route the
            `review_communication` task action to the correct submit endpoint.
        cashless_case_id:
          type: integer
          nullable: true
          description: >
            ID of the linked NhcxCashlessCase. Populated at callback time when
            the `claim_reference` resolves to a known hospital Claim. Use this
            to deep-link into the patient's cashless journey from the comms inbox.
        claim_id:
          type: integer
          nullable: true
          description: ID of the linked hospital Claim (resolved from claim_reference).
        sent_at:
          type: string
          format: date-time
          nullable: true
          description: Communication.sent — when the payer sent the message.
        received_at:
          type: string
          format: date-time
          nullable: true
          description: When the backend received the callback.
        payload:
          type: array
          description: >
            Communication.payload[] — the actual message content from the payer.
            Each entry has at most one content type populated.
          items:
            type: object
            properties:
              content_string:
                type: string
                nullable: true
                description: Free-text message content.
              content_attachment:
                type: string
                nullable: true
                description: URL to an attached document (e.g. query letter).
              content_reference:
                type: string
                nullable: true
                description: FHIR reference to another resource.
        workflow_code:
          type: string
          nullable: true
          description: Same as task_code — the workflow type for this communication.
        # Acknowledgement (payer-facing, auto-sent on receipt)
        acknowledged:
          type: boolean
          description: Whether the backend has sent an acknowledgement to the payer.
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        ack_correlation_id:
          type: string
          nullable: true
        # Provider read tracking (hospital inbox)
        provider_read:
          type: boolean
          description: >
            True if a hospital user has explicitly marked this communication as
            read via `PATCH /communication/{correlation_id}/read`. Distinct from
            `acknowledged` which is the payer-facing auto-acknowledgement.
        provider_read_at:
          type: string
          format: date-time
          nullable: true
          description: When the communication was first marked as read by provider staff.
        pending_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"
        completed_tasks:
          type: array
          items:
            $ref: "#/components/schemas/FrontendTask"

    GatewayStatusRequest:
      type: object
      required: [request_id, correlation_id]
      properties:
        request_id:
          type: string
          description: Mandatory client-generated request id (UUID recommended).
        correlation_id:
          type: string
        claim_id:
          type: integer
          nullable: true
        payer_id:
          type: string
          nullable: true
        provider_id:
          type: string
          nullable: true
          description: Provider/HFR/NPI id used as the JWE `x-hcx-sender_code`. Defaults to transaction/config provider id when omitted.
        workflow_id:
          oneOf:
            - type: integer
            - type: string
          nullable: true
        use_case:
          type: string
          nullable: true

    GatewayStatusResponse:
      type: object
      properties:
        correlation_id:
          type: string
        status:
          type: string
          example: submitted
        message:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Error family and numeric code in `<family>:<number>` format.
              examples:
                - "WRAPPER-ERROR:1001"
                - "NHCX-ERROR:1003"
            message:
              type: string