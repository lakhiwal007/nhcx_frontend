    ClaimDraft:
      type: object
      description: >
        Read-only preview of what will be submitted in the discharge or final claim.
        Mirrors PreauthDraft but also includes claim lifecycle fields.
      properties:
        cashless_case_id:
          type: integer
          nullable: true
          description: The originating cashless case (linked at claims/prepare time).
        claim_id:
          type: integer
        payer_id:
          type: string
        policy_number:
          type: string
          nullable: true
        preauth_ref:
          type: string
          nullable: true
          description: Preauth reference stored on the claim. Required for discharge and final claim submission.
        preauth_status:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        source:
          $ref: "#/components/schemas/PreauthSource"
        patient:
          $ref: "#/components/schemas/PreauthPatient"
        admission_date:
          type: string
          format: date
          nullable: true
        discharge_date:
          type: string
          format: date
          nullable: true
          description: Auto-resolved from ipd_discharges when available.
        total_amount:
          type: number
          nullable: true
        diagnoses:
          type: array
          items:
            $ref: "#/components/schemas/PreauthDiagnosis"
        procedures:
          type: array
          items:
            $ref: "#/components/schemas/PreauthProcedure"
        items:
          type: array
          items:
            $ref: "#/components/schemas/PreauthLineItem"
        care_team:
          type: array
          items:
            $ref: "#/components/schemas/PreauthCareTeamMember"
        supporting_documents:
          type: array
          items:
            $ref: "#/components/schemas/PreauthSupportingDocument"
        medications:
          type: array
          description: Coded medications from `ipd_clinical_notes.drug_ids` — emitted as coded `Claim.supportingInfo`.
          items:
            $ref: "#/components/schemas/ClinicalCode"
        investigations:
          type: array
          description: Coded investigations from `ipd_clinical_notes.test_ids`.
          items:
            $ref: "#/components/schemas/ClinicalCode"
        chief_complaints:
          type: array
          description: Coded chief complaints from `ipd_clinical_notes.complaint_ids`.
          items:
