  /cashless/{cashless_case_id}:
    get:
      tags: [Cashless Preparation]
      operationId: getCashlessStatus
      summary: Read aggregated cashless case status
      description: >
        Returns the current frontend state for InsurancePlan, CoverageEligibility,
        DB-derived procedures, and available next actions.
        Pass `force_refresh=true` to re-fire InsurancePlan and all three
        CoverageEligibility gateway calls using the case's stored data — equivalent
        to `POST /cashless/prepare` with `force_refresh: true` but without requiring
        the caller to supply `child_id`, `payer_id`, or `policy_number` again.
        Use only on explicit user action ("Re-run Eligibility Check"), never on
        routine polling.


        **Safe at any journey stage.** `force_refresh` is not gated on
        `current_step` or preauth/claim status — it works identically whether
        the case is still at `insurance_and_eligibility` or has progressed to
        `preauth_submitted`, `preauth_decided`, or beyond. Re-firing it only
        refreshes the `insurance_plan` / `coverage_eligibility` blocks in the
        response (e.g. updated sum insured or plan status); it never touches
        the submitted preauth/claim, never changes `preauth_status` or
        `decision`, and never resubmits anything to the payer. `current_step`
        itself never regresses because it is derived from the furthest stage
        reached, not from this call.
      parameters:
        - $ref: "#/components/parameters/RequestIdParam"
        - $ref: "#/components/parameters/ProviderIdHeader"
        - name: cashless_case_id
          in: path
          required: true
          schema:
            type: integer
          description: ID of the `nhcx_cashless_cases` row returned by cashless prepare.
        - name: force_refresh
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: >
            When true, re-fires InsurancePlan and all three CoverageEligibility
            gateway calls even if the case was previously submitted. Use only on
            explicit user action, not on routine polling.
      responses:
        "200":
          description: Aggregated cashless case
