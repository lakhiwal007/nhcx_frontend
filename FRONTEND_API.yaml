  /cashless/{cashless_case_id}/timeline:
    get:
      tags: [Cashless Preparation]
      operationId: getCaseTimeline
      summary: Per-case audit trail / timeline
      description: >
        Returns an ordered, timestamped, actor-attributed audit log for the
        cashless case — what happened, when, and who drove it (hospital user,
        payer callback, or a system job) — plus a rolled-up `money_ledger`.
        Reconstructed read-only from the workflow tables (no side effects), so it
        is safe to poll or open at any journey stage. Events are ordered by `seq`
        (a monotonic integer — the only ordering the UI should trust; timestamps
        can tie). Use it to render a case timeline and to see the RAW payer signal
        (`decision.raw_outcome` / `reason_codes` / inbound `nhcx_workflow_id`)
        alongside the wrapper's derived verdict, so a mis-classified decision is
        visible rather than hidden behind a confident banner.
      parameters:
        - $ref: "#/components/parameters/RequestIdParam"
        - $ref: "#/components/parameters/ProviderIdHeader"
        - name: cashless_case_id
          in: path
          required: true
          schema:
            type: integer
        - name: workflow
          in: query
          required: false
          description: >-
            Filter to one workflow lane: `case`, `insurance_plan`, `eligibility`,
            `preauth`, `claim`, `reprocess`, `payment`, `communication`.
          schema:
            type: string
        - name: actor
          in: query
          required: false
          description: "Filter by who drove the event: `hospital`, `payer`, or `system`."
          schema:
            type: string
            enum: [hospital, payer, system]
        - name: since
          in: query
          required: false
          description: ISO-8601 timestamp; only events at or after this instant are returned.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: The case timeline and money ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseTimelineResponse"
              examples:
                success:
                  value:
                    cashless_case_id: 4
                    claim_id: 101
                    child_id: 12
                    generated_at: "2026-07-12T10:00:00+05:30"
                    total_count: 6
